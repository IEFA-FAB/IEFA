# Terraform PLAN on PRs that touch infra/**. Read-only: surfaces the infra diff
# as a PR comment for review (Greptile + humans). It NEVER applies — apply stays
# human/out-of-band by design (see infra/README.md).
#
# Prereqs (one-time, see infra/README.md → "Terraform plan on PRs"):
#   - Apply foundation so the read-only plan role exists, then set repo VARIABLES:
#       AWS_REGION, AWS_TF_PLAN_ROLE_ARN, TF_STATE_BUCKET, TF_STATE_DYNAMODB_TABLE
#   - Set repo SECRET TF_TFVARS_JSON = a JSON object { "<stack>": "<tfvars file
#     contents>" }. tfvars stay out of the repo; CI materializes them at runtime.
#     A stack without an entry is skipped (plan needs its variables).
#
# Caveat: because the real tfvars live in the secret (not the repo), a PR that only
# changes service config (cpu/hosts) does NOT diff here — only .tf / module / new
# resource changes do. That's the tradeoff of keeping tfvars private.

name: terraform-plan

on:
  pull_request:
    paths:
      - "infra/**"

permissions:
  contents: read

concurrency:
  group: tf-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      stacks: ${{ steps.detect.outputs.stacks }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: detect
        name: Detect changed stacks
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          changed="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- infra/)"
          echo "Changed infra files:"; echo "$changed"

          # A module change affects every service stack (they consume ../modules/service).
          modules_changed=false
          if grep -q '^infra/modules/' <<<"$changed"; then modules_changed=true; fi

          stacks=()
          for d in infra/*/; do
            name="$(basename "$d")"
            case "$name" in modules|scripts|bootstrap) continue ;; esac
            [ -f "$d/main.tf" ] || continue
            if grep -q "^infra/$name/" <<<"$changed"; then
              stacks+=("$name")
            elif [ "$modules_changed" = true ] && [ "$name" != "foundation" ]; then
              stacks+=("$name")
            fi
          done

          # Unique, as a JSON array for the matrix.
          json="$(printf '%s\n' "${stacks[@]}" | awk 'NF' | sort -u | jq -R . | jq -cs .)"
          echo "stacks=$json" >> "$GITHUB_OUTPUT"
          echo "Stacks to plan: $json"

  plan:
    needs: detect
    if: needs.detect.outputs.stacks != '[]' && vars.AWS_TF_PLAN_ROLE_ARN != ''
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        stack: ${{ fromJSON(needs.detect.outputs.stacks) }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Materialize tfvars from secret
        id: tfvars
        env:
          TF_TFVARS_JSON: ${{ secrets.TF_TFVARS_JSON }}
          STACK: ${{ matrix.stack }}
        run: |
          set -euo pipefail
          content="$(jq -r --arg s "$STACK" '.[$s] // ""' <<<"${TF_TFVARS_JSON:-{}}")"
          if [ -z "$content" ]; then
            echo "has_tfvars=false" >> "$GITHUB_OUTPUT"
            echo "No tfvars for stack '$STACK' in TF_TFVARS_JSON — skipping plan."
          else
            printf '%s\n' "$content" > "infra/$STACK/terraform.tfvars"
            echo "has_tfvars=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.tfvars.outputs.has_tfvars == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TF_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Third-party action → hash-pinned per .github/zizmor.yml (Dependabot bumps it).
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        if: steps.tfvars.outputs.has_tfvars == 'true'
        with:
          terraform_version: "1.10.5"
          terraform_wrapper: false

      - name: Terraform init + plan (read-only)
        if: steps.tfvars.outputs.has_tfvars == 'true'
        id: plan
        # No ${{ }} in run bodies (zizmor template-injection): all inputs via env.
        env:
          STACK: ${{ matrix.stack }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_DYNAMODB_TABLE: ${{ vars.TF_STATE_DYNAMODB_TABLE }}
        run: |
          set -euo pipefail
          cd "infra/$STACK"
          # Reuse the committed backend key; inject bucket/table from repo vars.
          cp backend.tf.example backend.tf
          terraform init -input=false \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="dynamodb_table=$TF_STATE_DYNAMODB_TABLE"
          # -lock=false keeps this strictly read-only (no state lock write).
          set +e
          terraform plan -input=false -lock=false -no-color -out=/dev/null > plan.txt 2>&1
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
          set -e
          # Trim to keep the PR comment within GitHub's 65k-char limit.
          head -c 60000 plan.txt > plan.trimmed.txt
          [ "$(wc -c < plan.txt)" -gt 60000 ] && echo -e "\n… (truncated)" >> plan.trimmed.txt || true

      - name: Comment plan on PR
        if: steps.tfvars.outputs.has_tfvars == 'true'
        uses: actions/github-script@v7
        env:
          STACK: ${{ matrix.stack }}
          EXITCODE: ${{ steps.plan.outputs.exitcode }}
        with:
          script: |
            const fs = require('fs');
            const stack = process.env.STACK;
            const exitcode = process.env.EXITCODE;
            const body = fs.readFileSync('infra/' + stack + '/plan.trimmed.txt', 'utf8');
            const marker = `<!-- tf-plan:${stack} -->`;
            const status = exitcode === '0' ? '✅' : '❌';
            const comment = `${marker}\n### ${status} \`terraform plan\` — \`${stack}\`\n\n<details><summary>plan output</summary>\n\n\`\`\`\n${body}\n\`\`\`\n</details>`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body: comment });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: comment });
            }

      - name: Fail if plan errored
        if: steps.tfvars.outputs.has_tfvars == 'true' && steps.plan.outputs.exitcode != '0'
        env:
          STACK: ${{ matrix.stack }}
        run: |
          echo "terraform plan failed for $STACK"; exit 1
