# Sync runtime secrets: GitHub Secrets/Variables → AWS Secrets Manager.
# Assumes the OIDC deploy role (secretsmanager:PutSecretValue on /iefa/prod/*).
# Values never appear in logs: GitHub masks secret values, and payloads are
# written to $RUNNER_TEMP files (file://) instead of the command line.
#
# The per-service ECS task reads these JSON keys (must match each stack's
# secret_names in infra/<service>/terraform.tfvars). Missing sources are
# reported and that service is skipped, so you can see which GitHub secret/var
# still needs to be created.
name: sync-secrets

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to sync (or 'all')"
        type: choice
        default: all
        options: [all, api, sisub, portal, forms, 5s, rumaer, sisub-mcp, alpha]

permissions:
  id-token: write
  contents: read

jobs:
  sync:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    env:
      TARGET: ${{ inputs.service }}
      # All secrets and variables as JSON. Secret values are masked in logs.
      ALL_SECRETS: ${{ toJSON(secrets) }}
      ALL_VARS: ${{ toJSON(vars) }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync secrets
        run: |
          set -euo pipefail

          # Merge secrets + vars into one lookup object (vars win on key clash).
          jq -s '.[0] * .[1]' \
            <(printf '%s' "$ALL_SECRETS") \
            <(printf '%s' "$ALL_VARS") > "$RUNNER_TEMP/src.json"

          # Build a service JSON payload. Args are "JSON_KEY=SOURCE_KEY" pairs,
          # where SOURCE_KEY is the GitHub secret/variable name.
          # --slurpfile makes $src an array of the file's documents; index [0].
          build() {
            local obj="{}"
            for pair in "$@"; do
              local jkey="${pair%%=*}" skey="${pair##*=}"
              obj="$(jq --arg jk "$jkey" --arg sk "$skey" \
                --slurpfile src "$RUNNER_TEMP/src.json" \
                '.[$jk] = ($src[0][$sk] // "")' <<<"$obj")"
            done
            printf '%s' "$obj"
          }

          # put <svc> <secret_id> <required_csv> <JSON_KEY=SOURCE_KEY>...
          # Writes the FULL JSON (optional keys kept as "" when their source is
          # absent — the ECS task references every secret_names key, so each must
          # exist). Fails/skips only when a REQUIRED source is empty, so a missing
          # optional key never blocks a service nor clobbers its required keys.
          put() {
            local svc="$1" id="$2" required="$3"; shift 3
            local json; json="$(build "$@")"
            local miss="" rk
            for rk in ${required//,/ }; do
              [ -n "$(jq -r --arg k "$rk" '.[$k] // ""' <<<"$json")" ] || miss="$miss $rk"
            done
            if [ -n "$miss" ]; then
              echo "::error title=$svc::missing required GitHub source(s):$miss — skipped (existing secret untouched)"
              FAILED=1
              return 0
            fi
            local empty
            empty="$(jq -r 'to_entries[]|select(.value=="")|.key' <<<"$json" | paste -sd, -)"
            [ -n "$empty" ] && echo "::notice title=$svc::optional key(s) empty (feature disabled): $empty"
            printf '%s' "$json" > "$RUNNER_TEMP/payload.json"
            aws secretsmanager put-secret-value \
              --secret-id "$id" \
              --secret-string "file://$RUNNER_TEMP/payload.json" >/dev/null
            rm -f "$RUNNER_TEMP/payload.json"
            echo "✅ synced $id ($(jq 'length' <<<"$json") keys)"
          }

          want() { [ "$TARGET" = "all" ] || [ "$TARGET" = "$1" ]; }
          FAILED=0

          if want api; then
            put api /iefa/prod/api \
              "API_SUPABASE_URL,API_SUPABASE_SERVICE_ROLE_KEY,ADMIN_SECRET" \
              API_SUPABASE_URL=API_SUPABASE_URL \
              API_SUPABASE_SERVICE_ROLE_KEY=API_SUPABASE_SERVICE_ROLE_KEY \
              ADMIN_SECRET=ADMIN_SECRET
          fi

          # sisub: 5 required + 6 optional AI keys (chat/analytics; empty → "Em breve").
          if want sisub; then
            put sisub /iefa/prod/sisub \
              "VITE_SISUB_SUPABASE_URL,VITE_SISUB_SUPABASE_PUBLISHABLE_KEY,SISUB_SUPABASE_SECRET_KEY,SISUB_DATABASE_URL,ADMIN_SECRET" \
              VITE_SISUB_SUPABASE_URL=VITE_SISUB_SUPABASE_URL \
              VITE_SISUB_SUPABASE_PUBLISHABLE_KEY=VITE_SISUB_SUPABASE_PUBLISHABLE_KEY \
              SISUB_SUPABASE_SECRET_KEY=SISUB_SUPABASE_SECRET_KEY \
              SISUB_DATABASE_URL=SISUB_DATABASE_URL \
              ADMIN_SECRET=ADMIN_SECRET \
              MODULE_CHAT_AI_PROVIDER=MODULE_CHAT_AI_PROVIDER \
              MODULE_CHAT_AI_MODEL=MODULE_CHAT_AI_MODEL \
              MODULE_CHAT_AI_API_KEY=MODULE_CHAT_AI_API_KEY \
              ANALYTICS_AI_PROVIDER=ANALYTICS_AI_PROVIDER \
              ANALYTICS_AI_MODEL=ANALYTICS_AI_MODEL \
              ANALYTICS_AI_API_KEY=ANALYTICS_AI_API_KEY
          fi

          # portal/forms/5s share the sisub Supabase project (IEFA_*≡SISUB_*),
          # so the secret key comes from SISUB_SUPABASE_SECRET_KEY.
          if want portal; then
            put portal /iefa/prod/portal \
              "VITE_IEFA_SUPABASE_URL,VITE_IEFA_SUPABASE_PUBLISHABLE_KEY,IEFA_SUPABASE_SECRET_KEY" \
              VITE_IEFA_SUPABASE_URL=VITE_IEFA_SUPABASE_URL \
              VITE_IEFA_SUPABASE_PUBLISHABLE_KEY=VITE_IEFA_SUPABASE_PUBLISHABLE_KEY \
              IEFA_SUPABASE_SECRET_KEY=SISUB_SUPABASE_SECRET_KEY
          fi

          if want forms; then
            put forms /iefa/prod/forms \
              "VITE_IEFA_SUPABASE_URL,VITE_IEFA_SUPABASE_PUBLISHABLE_KEY,IEFA_SUPABASE_SECRET_KEY" \
              VITE_IEFA_SUPABASE_URL=VITE_IEFA_SUPABASE_URL \
              VITE_IEFA_SUPABASE_PUBLISHABLE_KEY=VITE_IEFA_SUPABASE_PUBLISHABLE_KEY \
              IEFA_SUPABASE_SECRET_KEY=SISUB_SUPABASE_SECRET_KEY
          fi

          if want 5s; then
            put 5s /iefa/prod/5s \
              "VITE_IEFA_SUPABASE_URL,VITE_IEFA_SUPABASE_PUBLISHABLE_KEY,IEFA_SUPABASE_SECRET_KEY" \
              VITE_IEFA_SUPABASE_URL=VITE_IEFA_SUPABASE_URL \
              VITE_IEFA_SUPABASE_PUBLISHABLE_KEY=VITE_IEFA_SUPABASE_PUBLISHABLE_KEY \
              IEFA_SUPABASE_SECRET_KEY=SISUB_SUPABASE_SECRET_KEY
          fi

          # rumaer shares the sisub Supabase project (see deploy.yml).
          if want rumaer; then
            put rumaer /iefa/prod/rumaer \
              "VITE_RUMAER_SUPABASE_URL,VITE_RUMAER_SUPABASE_PUBLISHABLE_KEY,RUMAER_SUPABASE_SECRET_KEY" \
              VITE_RUMAER_SUPABASE_URL=VITE_SISUB_SUPABASE_URL \
              VITE_RUMAER_SUPABASE_PUBLISHABLE_KEY=VITE_SISUB_SUPABASE_PUBLISHABLE_KEY \
              RUMAER_SUPABASE_SECRET_KEY=SISUB_SUPABASE_SECRET_KEY
          fi

          # mcp uses the sisub project; anon key = publishable key.
          if want sisub-mcp; then
            put sisub-mcp /iefa/prod/sisub-mcp \
              "SISUB_DATABASE_URL,VITE_SISUB_SUPABASE_URL,SISUB_SUPABASE_SECRET_KEY,SISUB_SUPABASE_ANON_KEY" \
              SISUB_DATABASE_URL=SISUB_DATABASE_URL \
              VITE_SISUB_SUPABASE_URL=VITE_SISUB_SUPABASE_URL \
              SISUB_SUPABASE_SECRET_KEY=SISUB_SUPABASE_SECRET_KEY \
              SISUB_SUPABASE_ANON_KEY=VITE_SISUB_SUPABASE_PUBLISHABLE_KEY
          fi

          # alpha (suspended): RAG-* Supabase/DB required; AI keys optional.
          if want alpha; then
            put alpha /iefa/prod/alpha \
              "SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY,DATABASE_URL" \
              SUPABASE_URL=RAG_SUPABASE_URL \
              SUPABASE_SERVICE_ROLE_KEY=RAG_SUPABASE_SERVICE_ROLE_KEY \
              DATABASE_URL=RAG_DATABASE_URL \
              NVIDIA_API_KEY=NVIDIA_API_KEY \
              ALPHA_AI_API_KEY=ALPHA_AI_API_KEY \
              LANGCHAIN_API_KEY=LANGCHAIN_API_KEY
          fi

          [ "$FAILED" = "0" ] || { echo "::error::one or more services were skipped (missing required source)"; exit 1; }
          echo "done."
