# Reusable: força um novo deploy de um servico ECS (imagem :latest já publicada
# no ECR pelo _app-build.yml), aguarda estabilizar e roda smoke test.
# O rollback é automático: os ECS services têm deployment_circuit_breaker com
# rollback = true (ver infra/sisub/ecs.tf), então uma revisão que não estabiliza
# volta sozinha para a anterior.
#
# Requer as GitHub Actions Variables: AWS_REGION, AWS_DEPLOY_ROLE_ARN, ECS_CLUSTER.
name: app-deploy

on:
  workflow_call:
    inputs:
      service:
        description: "Nome do ECS service = chave do servico (ex: sisub, 5s)"
        required: true
        type: string
      health_url:
        description: "URL de health check; se vazio, smoke test é pulado"
        required: false
        type: string
        default: ""
      concurrency_suffix:
        description: "Sufixo do grupo de concorrência (ex: sisub)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: ecs-deploy-${{ inputs.concurrency_suffix }}-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Force new deployment
        id: deploy
        env:
          CLUSTER: ${{ vars.ECS_CLUSTER }}
          SERVICE: ${{ inputs.service }}
        run: |
          DEPLOY_ID="$(aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --force-new-deployment \
            --query 'service.deployments[?status==`PRIMARY`].id | [0]' \
            --output text)"
          echo "deployment_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "Triggered deployment $DEPLOY_ID for $SERVICE on $CLUSTER"

      - name: Wait for service to stabilize
        env:
          CLUSTER: ${{ vars.ECS_CLUSTER }}
          SERVICE: ${{ inputs.service }}
        run: |
          aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE"

      - name: Verify new revision rolled out (not rolled back)
        env:
          CLUSTER: ${{ vars.ECS_CLUSTER }}
          SERVICE: ${{ inputs.service }}
          DEPLOY_ID: ${{ steps.deploy.outputs.deployment_id }}
        run: |
          # wait services-stable also returns 0 when the deployment circuit
          # breaker rolls back (old tasks become stable again). Assert the
          # deployment we triggered actually reached COMPLETED, otherwise the new
          # image was rejected and silently reverted — fail so CI reflects it.
          STATE="$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query "services[0].deployments[?id=='$DEPLOY_ID'].rolloutState | [0]" --output text)"
          echo "Deployment $DEPLOY_ID rolloutState=$STATE"
          if [ "$STATE" != "COMPLETED" ]; then
            echo "::error::Deployment $DEPLOY_ID did not complete (state=$STATE) — the circuit breaker likely rolled it back."
            aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
              --query 'services[0].events[0:6].message' --output text || true
            exit 1
          fi

      - name: Smoke test
        if: inputs.health_url != ''
        env:
          HEALTH_URL: ${{ inputs.health_url }}
        run: |
          for i in {1..10}; do
            status="$(curl -fsSL --ipv4 --max-redirs 5 --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)"
            if [[ "${status:0:1}" == "2" ]]; then echo "✅ ${{ inputs.concurrency_suffix }} health check passed"; exit 0; fi
            echo "Attempt $i/10 - status: ${status:-(connection error)} - waiting 10s..."; sleep 10
          done
          echo "❌ ${{ inputs.concurrency_suffix }} health check failed"; exit 1
