# Reusable: deploy de uma imagem já publicada → Fly, com smoke test e rollback.
# Usado por deploy.yml (um caller por app). Concentra o bloco idêntico de
# deploy → smoke → rollback que antes era duplicado em cada deploy-<app>.
name: app-deploy

on:
  workflow_call:
    inputs:
      image_repo:
        description: "Repositório da imagem sem tag (ex: registry.fly.io/sisub)"
        required: true
        type: string
      image_tag:
        description: "Tag da imagem a deployar (output do app-build)"
        required: true
        type: string
      fly_config:
        description: "Caminho do fly.toml (ex: fly/sisub.toml)"
        required: true
        type: string
      health_url:
        description: "URL de health check; se vazio, smoke test é pulado"
        required: false
        type: string
        default: ""
      concurrency_suffix:
        description: "Sufixo do grupo de concorrência (ex: sisub)"
        required: true
        type: string
    secrets:
      FLY_API_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    concurrency:
      group: fly-deploy-${{ inputs.concurrency_suffix }}-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: flyctl deploy -c "${{ inputs.fly_config }}" --image "${{ inputs.image_repo }}:$IMAGE_TAG" --wait-timeout 300

      - name: Smoke test
        if: inputs.health_url != ''
        env:
          HEALTH_URL: ${{ inputs.health_url }}
        run: |
          for i in {1..10}; do
            status="$(curl -fsSL --ipv4 --max-redirs 5 --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)"
            if [[ "${status:0:1}" == "2" ]]; then echo "✅ ${{ inputs.concurrency_suffix }} health check passed"; exit 0; fi
            echo "Attempt $i/10 - status: ${status:-(connection error)} - waiting 10s..."; sleep 10
          done
          echo "❌ ${{ inputs.concurrency_suffix }} health check failed"; exit 1

      - name: Rollback on failure
        if: failure()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          PREV=$(flyctl releases -c "${{ inputs.fly_config }}" --json | jq -r '.[1].ImageRef // empty')
          if [[ -z "$PREV" ]]; then echo "⚠️ No previous release to roll back to"; exit 0; fi
          flyctl deploy -c "${{ inputs.fly_config }}" --image "$PREV" --wait-timeout 300 || true
