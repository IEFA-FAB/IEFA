# Reusable: build + push de um app via docker-bake → Amazon ECR.
# Usado por deploy.yml (um caller por app). Autentica na AWS via OIDC
# (sem chaves de acesso de longa duracao) e publica no repo ECR do servico.
#
# Requer as GitHub Actions Variables (Settings → Secrets and variables → Actions):
#   AWS_REGION, AWS_DEPLOY_ROLE_ARN, ECR_REGISTRY, ECR_REPOSITORY_PREFIX
# Preencha com os valores do `terraform output github_actions_variables`.
name: app-build

on:
  workflow_call:
    inputs:
      service:
        description: "Chave do servico = target do docker-bake.hcl e sufixo do repo ECR (ex: sisub, 5s)"
        required: true
        type: string
      bake_set:
        description: "Linhas extras de `set` do bake (build args), uma por linha"
        required: false
        type: string
        default: ""
    outputs:
      tag:
        description: "Tag unica gerada para a imagem"
        value: ${{ jobs.build.outputs.tag }}
    secrets:
      FARO_SOURCEMAP_API_KEY:
        description: "Faro sourcemap upload key — injetado como build arg <service>.args.FARO_SOURCEMAP_API_KEY quando presente"
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          # O token do checkout fica no .git/config e viaja em qualquer artifact/log gerado
          # depois. Este job só faz build e push pro ECR — não usa credencial de git.
          persist-credentials: false

      - uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/bake-action@v7
        env:
          IMAGE_REPO: ${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPOSITORY_PREFIX }}/${{ inputs.service }}
        with:
          files: ./docker-bake.hcl
          targets: ${{ inputs.service }}
          push: true
          # ECS task definitions pin the `:latest` tag, so pushing `:latest` is
          # what actually gets rolled out by `--force-new-deployment`. A
          # sha-tagged image is also pushed for traceability/rollback.
          set: |
            ${{ inputs.service }}.tags=${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.tag }}
            ${{ inputs.service }}.tags=${{ env.IMAGE_REPO }}:latest
            ${{ inputs.bake_set }}
            ${{ secrets.FARO_SOURCEMAP_API_KEY && format('{0}.args.FARO_SOURCEMAP_API_KEY={1}', inputs.service, secrets.FARO_SOURCEMAP_API_KEY) || '' }}

      # Varredura da imagem que ACABOU de ser publicada — a única camada que enxerga o
      # que veio da imagem base e dos pacotes de SO (opengrep/codeql só olham o código).
      # `exit-code: 0` de propósito: isto é observação, não gate. Bloquear o deploy por
      # CVE de pacote de SO sem fix disponível pararia a entrega sem ganho real.
      - name: Trivy — scan da imagem
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPOSITORY_PREFIX }}/${{ inputs.service }}:${{ steps.meta.outputs.tag }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
