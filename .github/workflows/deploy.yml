name: CI/CD
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_api:
        description: "Force deploy API"
        type: boolean
        default: false
      force_portal:
        description: "Force deploy portal"
        type: boolean
        default: false
      force_rumaer:
        description: "Force deploy rumaer"
        type: boolean
        default: false
      force_sucont:
        description: "Force deploy sucont"
        type: boolean
        default: false
      force_assignment_selection:
        description: "Force deploy assignment-selection"
        type: boolean
        default: false
      force_sisub:
        description: "Force deploy sisub"
        type: boolean
        default: false
      force_docs:
        description: "Force deploy docs"
        type: boolean
        default: false
      force_forms:
        description: "Force deploy forms"
        type: boolean
        default: false
      force_5s:
        description: "Force deploy 5S"
        type: boolean
        default: false
      force_mcp:
        description: "Force deploy sisub-mcp"
        type: boolean
        default: false

# id-token: write → OIDC para assumir a role de deploy AWS (sem chaves estaticas).
permissions:
  contents: read
  id-token: write

jobs:
  # ============================================
  # DETECT CHANGES
  # ============================================
  changes:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      api: ${{ steps.final.outputs.api }}
      portal: ${{ steps.final.outputs.portal }}
      rumaer: ${{ steps.final.outputs.rumaer }}
      sucont: ${{ steps.final.outputs.sucont }}
      assignment_selection: ${{ steps.final.outputs.assignment_selection }}
      sisub: ${{ steps.final.outputs.sisub }}
      forms: ${{ steps.final.outputs.forms }}
      docs: ${{ steps.final.outputs.docs }}
      # alpha: ${{ steps.final.outputs.alpha }}
      5s: ${{ steps.final.outputs['5s'] }}
      mcp: ${{ steps.final.outputs.mcp }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_app-build.yml'
              - '.github/workflows/_app-deploy.yml'
              - 'package.json'
              - 'turbo.json'
            portal:
              - 'apps/portal/**'
              - 'packages/hono-client/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_app-build.yml'
              - '.github/workflows/_app-deploy.yml'
              - 'package.json'
              - 'turbo.json'
            rumaer:
              - 'apps/rumaer/**'
              - 'packages/database/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_app-build.yml'
              - '.github/workflows/_app-deploy.yml'
              - 'package.json'
              - 'turbo.json'
            sucont:
              - 'apps/sucont/**'
              - 'packages/database/**'
              - 'packages/pbac/**'
              - 'packages/ai-provider/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_app-build.yml'
              - '.github/workflows/_app-deploy.yml'
              - 'package.json'
              - 'turbo.json'
            assignment_selection:
              - 'apps/assignment-selection/**'
              - 'packages/database/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_app-build.yml'
              - '.github/workflows/_app-deploy.yml'
              - 'package.json'
              - 'turbo.json'
            sisub:
              - 'apps/sisub/**'
              - 'packages/database/**'
              - 'packages/hono-client/**'
              - 'packages/alpha-client/**'
              - 'packages/ai-provider/**'
              - 'packages/pbac/**'
              - 'packages/sisub-domain/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_app-build.yml'
              - '.github/workflows/_app-deploy.yml'
              - 'package.json'
              - 'turbo.json'
            forms:
              - 'apps/forms/**'
              - 'packages/database/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_app-build.yml'
              - '.github/workflows/_app-deploy.yml'
              - 'package.json'
              - 'turbo.json'
            docs:
              - 'apps/docs/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_app-build.yml'
              - '.github/workflows/_app-deploy.yml'
              - 'package.json'
              - 'turbo.json'
            # alpha:
            #   - 'apps/alpha/**'
            #   - 'packages/alpha-client/**'
            #   - 'packages/ai-provider/**'
            #   - 'Dockerfile'
            #   - 'docker-bake.hcl'
            #   - '.github/workflows/deploy.yml'
            #   - 'package.json'
            #   - 'turbo.json'
            5s:
              - 'apps/forms/**'
              - 'packages/database/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_app-build.yml'
              - '.github/workflows/_app-deploy.yml'
              - 'package.json'
              - 'turbo.json'
            mcp:
              - 'apps/sisub-mcp/**'
              - 'packages/database/**'
              - 'packages/pbac/**'
              - 'packages/sisub-domain/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_app-build.yml'
              - '.github/workflows/_app-deploy.yml'
              - 'package.json'
              - 'turbo.json'

      # workflow_dispatch: use force_* inputs; push: use paths filter
      - name: Resolve outputs
        id: final
        env:
          EVENT_NAME: ${{ github.event_name }}
          FORCE_API: ${{ inputs.force_api }}
          FORCE_PORTAL: ${{ inputs.force_portal }}
          FORCE_RUMAER: ${{ inputs.force_rumaer }}
          FORCE_SUCONT: ${{ inputs.force_sucont }}
          FORCE_ASSIGNMENT_SELECTION: ${{ inputs.force_assignment_selection }}
          FORCE_SISUB: ${{ inputs.force_sisub }}
          FORCE_DOCS: ${{ inputs.force_docs }}
          FORCE_FORMS: ${{ inputs.force_forms }}
          # FORCE_ALPHA: ${{ inputs.force_alpha }}
          FORCE_5S: ${{ inputs.force_5s }}
          FORCE_MCP: ${{ inputs.force_mcp }}
          FILTER_API: ${{ steps.filter.outputs.api }}
          FILTER_PORTAL: ${{ steps.filter.outputs.portal }}
          FILTER_RUMAER: ${{ steps.filter.outputs.rumaer }}
          FILTER_SUCONT: ${{ steps.filter.outputs.sucont }}
          FILTER_ASSIGNMENT_SELECTION: ${{ steps.filter.outputs.assignment_selection }}
          FILTER_SISUB: ${{ steps.filter.outputs.sisub }}
          FILTER_FORMS: ${{ steps.filter.outputs.forms }}
          FILTER_DOCS: ${{ steps.filter.outputs.docs }}
          # FILTER_ALPHA: ${{ steps.filter.outputs.alpha }}
          FILTER_5S: ${{ steps.filter.outputs['5s'] }}
          FILTER_MCP: ${{ steps.filter.outputs.mcp }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "api=$FORCE_API"       >> $GITHUB_OUTPUT
            echo "portal=$FORCE_PORTAL" >> $GITHUB_OUTPUT
            echo "rumaer=$FORCE_RUMAER" >> $GITHUB_OUTPUT
            echo "sucont=$FORCE_SUCONT" >> $GITHUB_OUTPUT
            echo "assignment_selection=$FORCE_ASSIGNMENT_SELECTION" >> $GITHUB_OUTPUT
            echo "sisub=$FORCE_SISUB"   >> $GITHUB_OUTPUT
            echo "forms=$FORCE_FORMS"   >> $GITHUB_OUTPUT
            echo "docs=$FORCE_DOCS"     >> $GITHUB_OUTPUT
            # echo "alpha=$FORCE_ALPHA"   >> $GITHUB_OUTPUT
            echo "5s=$FORCE_5S"         >> $GITHUB_OUTPUT
            echo "mcp=$FORCE_MCP"       >> $GITHUB_OUTPUT
          else
            echo "api=$FILTER_API"       >> $GITHUB_OUTPUT
            echo "portal=$FILTER_PORTAL" >> $GITHUB_OUTPUT
            echo "rumaer=$FILTER_RUMAER" >> $GITHUB_OUTPUT
            echo "sucont=$FILTER_SUCONT" >> $GITHUB_OUTPUT
            echo "assignment_selection=$FILTER_ASSIGNMENT_SELECTION" >> $GITHUB_OUTPUT
            echo "sisub=$FILTER_SISUB"   >> $GITHUB_OUTPUT
            echo "forms=$FILTER_FORMS"   >> $GITHUB_OUTPUT
            echo "docs=$FILTER_DOCS"     >> $GITHUB_OUTPUT
            # echo "alpha=$FILTER_ALPHA"   >> $GITHUB_OUTPUT
            echo "5s=$FILTER_5S"         >> $GITHUB_OUTPUT
            echo "mcp=$FILTER_MCP"       >> $GITHUB_OUTPUT
          fi

  # ============================================================
  # WARM DEPS CACHE
  # Builda o estágio `deps` uma vez e popula o scope `deps` do cache gha.
  # Todos os build-<app> dependem deste job e leem esse cache → o `bun install`
  # do monorepo não é refeito por app em cache frio.
  # ============================================================
  warm-deps:
    needs: [changes]
    if: >-
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.portal == 'true' ||
      needs.changes.outputs.rumaer == 'true' ||
      needs.changes.outputs.sucont == 'true' ||
      needs.changes.outputs.assignment_selection == 'true' ||
      needs.changes.outputs.sisub == 'true' ||
      needs.changes.outputs.forms == 'true' ||
      needs.changes.outputs.docs == 'true' ||
      needs.changes.outputs['5s'] == 'true' ||
      needs.changes.outputs.mcp == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Warm deps cache
        uses: docker/bake-action@v7
        with:
          files: ./docker-bake.hcl
          targets: deps
          push: false

  # ============================================================
  # API ── check → build → deploy
  # ============================================================
  check-api:
    needs: [changes]
    if: needs.changes.outputs.api == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/api
        env:
          API_SUPABASE_URL: ${{ vars.API_SUPABASE_URL }}
          API_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.API_SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}

  build-api:
    needs: [check-api, warm-deps]
    uses: ./.github/workflows/_app-build.yml
    with:
      service: api
    secrets: inherit

  deploy-api:
    needs: [build-api]
    uses: ./.github/workflows/_app-deploy.yml
    with:
      service: api
      health_url: ${{ vars.API_HEALTH_URL }}
      concurrency_suffix: api

  # ============================================================
  # PORTAL  ── check → build → deploy
  # ============================================================
  check-portal:
    needs: [changes]
    if: needs.changes.outputs.portal == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/portal
        env:
          VITE_IEFA_SUPABASE_URL: ${{ vars.VITE_IEFA_SUPABASE_URL }}
          VITE_IEFA_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY }}

  build-portal:
    needs: [check-portal, warm-deps]
    uses: ./.github/workflows/_app-build.yml
    with:
      service: portal
      bake_set: |
        portal.args.VITE_IEFA_SUPABASE_URL=${{ vars.VITE_IEFA_SUPABASE_URL }}
        portal.args.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY }}
    secrets: inherit

  deploy-portal:
    needs: [build-portal]
    uses: ./.github/workflows/_app-deploy.yml
    with:
      service: portal
      health_url: ${{ vars.IEFA_HEALTH_URL }}
      concurrency_suffix: portal

  # ============================================================
  # RUMAER  ── check → build → deploy
  # Mesmo projeto Supabase do sisub → reutiliza vars/secrets do sisub,
  # mapeados para os nomes VITE_RUMAER_* no build. Secrets de runtime ficam
  # no Secrets Manager (ver infra/sisub/secrets/rumaer.example.json).
  # ============================================================
  check-rumaer:
    needs: [changes]
    if: needs.changes.outputs.rumaer == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/rumaer
        env:
          VITE_RUMAER_SUPABASE_URL: ${{ vars.VITE_SISUB_SUPABASE_URL }}
          VITE_RUMAER_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}

  build-rumaer:
    needs: [check-rumaer, warm-deps]
    uses: ./.github/workflows/_app-build.yml
    with:
      service: rumaer
      bake_set: |
        rumaer.args.VITE_RUMAER_SUPABASE_URL=${{ vars.VITE_SISUB_SUPABASE_URL }}
        rumaer.args.VITE_RUMAER_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}
    secrets: inherit

  deploy-rumaer:
    needs: [build-rumaer]
    uses: ./.github/workflows/_app-deploy.yml
    with:
      service: rumaer
      health_url: ${{ vars.RUMAER_HEALTH_URL }}
      concurrency_suffix: rumaer

  # ============================================================
  # SUCONT (HUB SUCONT-4) ── check → build → deploy
  # Mesmo projeto Supabase do sisub → reutiliza vars/secrets do sisub,
  # mapeados para os nomes VITE_SUCONT_* no build. Secrets de runtime ficam no
  # Secrets Manager (ver infra/sucont/secrets/sucont.example.json). IA via Bedrock
  # é keyless (task role) — sem secret de API key.
  # ============================================================
  check-sucont:
    needs: [changes]
    if: needs.changes.outputs.sucont == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # Só lint por ora: o código dos analisadores portados do Google AI Studio
      # ainda não é type-clean (Charts/recharts, tipos do h3). Reabilitar typecheck
      # (`bunx turbo run lint typecheck ...`) quando essa dívida for saneada.
      - name: Lint
        run: bunx turbo run lint --filter=./apps/sucont

  build-sucont:
    needs: [check-sucont, warm-deps]
    uses: ./.github/workflows/_app-build.yml
    with:
      service: sucont
      bake_set: |
        sucont.args.VITE_SUCONT_SUPABASE_URL=${{ vars.VITE_SISUB_SUPABASE_URL }}
        sucont.args.VITE_SUCONT_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}
    secrets: inherit

  deploy-sucont:
    needs: [build-sucont]
    uses: ./.github/workflows/_app-deploy.yml
    with:
      service: sucont
      health_url: ${{ vars.SUCONT_HEALTH_URL }}
      concurrency_suffix: sucont

  # ============================================================
  # ASSIGNMENT-SELECTION (escolha de vagas / CPAINT) ── check → build → deploy
  # Mesmo projeto Supabase do sisub → reutiliza vars/secrets do sisub,
  # mapeados para os nomes VITE_ASSIGNMENT_SELECTION_* no build. Secrets de
  # runtime ficam no Secrets Manager (infra/assignment-selection/secrets/).
  # ============================================================
  check-assignment-selection:
    needs: [changes]
    if: needs.changes.outputs.assignment_selection == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/assignment-selection
        env:
          VITE_ASSIGNMENT_SELECTION_SUPABASE_URL: ${{ vars.VITE_SISUB_SUPABASE_URL }}
          VITE_ASSIGNMENT_SELECTION_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}

  build-assignment-selection:
    needs: [check-assignment-selection, warm-deps]
    uses: ./.github/workflows/_app-build.yml
    with:
      service: assignment-selection
      bake_set: |
        assignment-selection.args.VITE_ASSIGNMENT_SELECTION_SUPABASE_URL=${{ vars.VITE_SISUB_SUPABASE_URL }}
        assignment-selection.args.VITE_ASSIGNMENT_SELECTION_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}
    secrets: inherit

  deploy-assignment-selection:
    needs: [build-assignment-selection]
    uses: ./.github/workflows/_app-deploy.yml
    with:
      service: assignment-selection
      health_url: ${{ vars.ASSIGNMENT_SELECTION_HEALTH_URL }}
      concurrency_suffix: assignment-selection

  # ============================================================
  # SISUB  ── check → build → (e2e) → deploy
  # ============================================================
  check-sisub:
    needs: [changes]
    if: needs.changes.outputs.sisub == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types · unit · integration tests
        run: |
          bunx turbo run lint typecheck test:unit test:integration --filter=./apps/sisub
          bunx turbo run test --filter=./packages/pbac
          bunx turbo run test --filter=./packages/sisub-domain
        env:
          VITE_SISUB_SUPABASE_URL: ${{ vars.VITE_SISUB_SUPABASE_URL }}
          VITE_SISUB_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}
          SISUB_SUPABASE_SECRET_KEY: ${{ secrets.SISUB_SUPABASE_SECRET_KEY }}
          ANALYTICS_AI_PROVIDER: ${{ vars.ANALYTICS_AI_PROVIDER }}
          ANALYTICS_AI_MODEL: ${{ vars.ANALYTICS_AI_MODEL }}
          ANALYTICS_AI_API_KEY: ${{ secrets.ANALYTICS_AI_API_KEY }}
          MODULE_CHAT_AI_PROVIDER: ${{ vars.MODULE_CHAT_AI_PROVIDER }}
          MODULE_CHAT_AI_MODEL: ${{ vars.MODULE_CHAT_AI_MODEL }}
          MODULE_CHAT_AI_API_KEY: ${{ secrets.MODULE_CHAT_AI_API_KEY }}

  build-sisub:
    needs: [check-sisub, warm-deps]
    uses: ./.github/workflows/_app-build.yml
    with:
      service: sisub
      # Observability camada 1 (Faro frontend) + camada 3 (sourcemaps) entram como
      # build args — VITE_* são baked no bundle do cliente. Vars vazias → no-op.
      # FARO_SOURCEMAP_API_KEY é secret: o _app-build.yml o injeta como
      # <service>.args.FARO_SOURCEMAP_API_KEY (secrets não são válidos em `with:`).
      # Camada 2 (OTel backend) é runtime → Secrets Manager (secrets/sisub.example.json).
      bake_set: |
        sisub.args.VITE_SISUB_SUPABASE_URL=${{ vars.VITE_SISUB_SUPABASE_URL }}
        sisub.args.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}
        sisub.args.VITE_FARO_COLLECTOR_URL=${{ vars.VITE_FARO_COLLECTOR_URL }}
        sisub.args.VITE_FARO_APP_NAME=${{ vars.VITE_FARO_APP_NAME }}
        sisub.args.VITE_FARO_ENVIRONMENT=${{ vars.VITE_FARO_ENVIRONMENT }}
    secrets: inherit

  # E2E SISUB temporarily disabled.
  # Re-enable this job and add it back to deploy-sisub.needs when the CI
  # webServer timeout / test credentials setup is fixed.
  #
  # e2e-sisub:
  #   needs: [changes, check-sisub]
  #   if: needs.changes.outputs.sisub == 'true'
  #   runs-on: blacksmith-4vcpu-ubuntu-2404
  #   timeout-minutes: 20
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: oven-sh/setup-bun@v2
  #       with:
  #         bun-version: "1.3.14"
  #     - uses: actions/cache@v5
  #       with:
  #         path: ~/.bun/install/cache
  #         key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
  #         restore-keys: ${{ runner.os }}-bun-
  #     - name: Install dependencies
  #       run: bun install --frozen-lockfile
  #     - name: Install Playwright Chromium
  #       run: bunx playwright install --with-deps chromium
  #       working-directory: apps/sisub
  #     - name: Run SISUB critical E2E
  #       run: bunx turbo run test:e2e:ci --filter=./apps/sisub
  #       env:
  #         CI: true
  #         VITE_SISUB_SUPABASE_URL: ${{ vars.VITE_SISUB_SUPABASE_URL }}
  #         VITE_SISUB_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}
  #         SISUB_SUPABASE_SECRET_KEY: ${{ secrets.SISUB_SUPABASE_SECRET_KEY }}
  #         E2E_TEST_USER_EMAIL: ${{ secrets.SISUB_E2E_TEST_USER_EMAIL }}
  #         E2E_TEST_USER_PASSWORD: ${{ secrets.SISUB_E2E_TEST_USER_PASSWORD }}
  #     - name: Upload Playwright artifacts
  #       if: always()
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: sisub-playwright-artifacts
  #         path: |
  #           apps/sisub/playwright-report/
  #           apps/sisub/test-results/
  #         if-no-files-found: ignore

  deploy-sisub:
    needs: [build-sisub]
    uses: ./.github/workflows/_app-deploy.yml
    with:
      service: sisub
      health_url: ${{ vars.SISUB_HEALTH_URL }}
      concurrency_suffix: sisub

  # ============================================================
  # FORMS  ── check → build → deploy
  # ============================================================
  check-forms:
    needs: [changes]
    if: needs.changes.outputs.forms == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/forms
        env:
          VITE_IEFA_SUPABASE_URL: ${{ vars.VITE_IEFA_SUPABASE_URL }}
          VITE_IEFA_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY }}

  build-forms:
    needs: [check-forms, warm-deps]
    uses: ./.github/workflows/_app-build.yml
    with:
      service: forms
      bake_set: |
        forms.args.VITE_IEFA_SUPABASE_URL=${{ vars.VITE_IEFA_SUPABASE_URL }}
        forms.args.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY }}
        forms.args.VITE_APP_TENANT=forms
    secrets: inherit

  deploy-forms:
    needs: [build-forms]
    uses: ./.github/workflows/_app-deploy.yml
    with:
      service: forms
      health_url: ${{ vars.FORMS_HEALTH_URL }}
      concurrency_suffix: forms

  # ============================================================
  # DOCS  ── check → build → deploy
  # ============================================================
  check-docs:
    needs: [changes]
    if: needs.changes.outputs.docs == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types
        run: bunx turbo run lint typecheck --filter=./apps/docs

  build-docs:
    needs: [check-docs, warm-deps]
    uses: ./.github/workflows/_app-build.yml
    with:
      service: docs
    secrets: inherit

  deploy-docs:
    needs: [build-docs]
    uses: ./.github/workflows/_app-deploy.yml
    with:
      service: docs
      health_url: ${{ vars.DOCS_HEALTH_URL }}
      concurrency_suffix: docs

  # ============================================================
  # 5S (apps/forms)  ── check → build → deploy
  # ============================================================
  check-5s:
    needs: [changes]
    if: needs.changes.outputs['5s'] == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/forms
        env:
          VITE_IEFA_SUPABASE_URL: ${{ vars.VITE_IEFA_SUPABASE_URL }}
          VITE_IEFA_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY }}

  build-5s:
    needs: [check-5s, warm-deps]
    uses: ./.github/workflows/_app-build.yml
    with:
      service: 5s
      bake_set: |
        5s.args.VITE_IEFA_SUPABASE_URL=${{ vars.VITE_IEFA_SUPABASE_URL }}
        5s.args.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY }}
        5s.args.VITE_APP_TENANT=cinco-s
    secrets: inherit

  deploy-5s:
    needs: [build-5s]
    uses: ./.github/workflows/_app-deploy.yml
    with:
      service: 5s
      health_url: ${{ vars.FORMS_5S_HEALTH_URL }}
      concurrency_suffix: 5s

  # ============================================================
  # SISUB-MCP  ── check → build → deploy
  # ============================================================
  check-mcp:
    needs: [changes]
    if: needs.changes.outputs.mcp == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types
        run: bunx turbo run lint typecheck --filter=./apps/sisub-mcp

  build-mcp:
    needs: [check-mcp, warm-deps]
    uses: ./.github/workflows/_app-build.yml
    with:
      service: sisub-mcp
    secrets: inherit

  deploy-mcp:
    needs: [build-mcp]
    uses: ./.github/workflows/_app-deploy.yml
    with:
      service: sisub-mcp
      health_url: ${{ vars.MCP_HEALTH_URL }}
      concurrency_suffix: sisub-mcp

  # ============================================================
  # Projeto α / apps/alpha  ── SUSPENSO
  # Para reativar: descomentar os blocos `alpha` em changes/paths-filter acima e
  # adicionar callers usando os reusables _app-build.yml / _app-deploy.yml:
  #   build-alpha:  service=alpha, bake_set com as VITE_* necessarias
  #   deploy-alpha: service=alpha, health_url=${{ vars.RAG_HEALTH_URL }}, concurrency_suffix=alpha
  # Secrets de runtime ficam no Secrets Manager (infra/alpha/secrets/alpha.example.json):
  #   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, DATABASE_URL, NVIDIA_API_KEY,
  #   ALPHA_AI_API_KEY, LANGCHAIN_API_KEY, etc.
