name: CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  actions: write

jobs:
  # ============================================
  # DETECT CHANGES
  # ============================================
  changes:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      api: ${{ steps.filter.outputs.api }}
      iefa: ${{ steps.filter.outputs.iefa }}
      sisub: ${{ steps.filter.outputs.sisub }}
      docs: ${{ steps.filter.outputs.docs }}
      rag: ${{ steps.filter.outputs.rag }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'turbo.json'
            iefa:
              - 'apps/portal/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'turbo.json'
            sisub:
              - 'apps/sisub/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'turbo.json'
            docs:
              - 'apps/docs/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'turbo.json'
            rag:
              - 'apps/ai/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'turbo.json'

  # ============================================================
  # API  ── check → build → deploy
  # ============================================================
  check-api:
    needs: [changes]
    if: needs.changes.outputs.api == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile

      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/api
        env:
          API_SUPABASE_URL: ${{ vars.API_SUPABASE_URL }}
          API_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.API_SUPABASE_SERVICE_ROLE_KEY }}

  build-api:
    needs: check-api
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Login to Fly Registry
        run: echo "${{ secrets.FLY_API_TOKEN }}" | docker login registry.fly.io -u x --password-stdin

      - name: Generate tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          targets: api
          push: true
          set: |
            api.tags=registry.fly.io/iefa-api:${{ steps.meta.outputs.tag }}
            api.tags=registry.fly.io/iefa-api:latest

  deploy-api:
    needs: build-api
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    concurrency:
      group: fly-deploy-api-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Set Fly secrets
        run: |
          flyctl --config fly/api.toml secrets set \
            API_PORT=${{ vars.API_PORT }} \
            API_SUPABASE_SERVICE_ROLE_KEY=${{ secrets.API_SUPABASE_SERVICE_ROLE_KEY }} \
            API_SUPABASE_URL=${{ vars.API_SUPABASE_URL }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy -c fly/api.toml --image registry.fly.io/iefa-api:${{ needs.build-api.outputs.tag }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke test
        run: |
          for i in {1..20}; do
            if curl -fsS "${{ vars.API_HEALTH_URL }}" > /dev/null; then
              echo "✅ Health check passed"; exit 0
            fi
            sleep 10
          done
          echo "❌ Health check failed"; exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          PREV=$(flyctl releases -c fly/api.toml --json | jq -r '.[1].ImageRef // empty')
          [[ -n "$PREV" ]] && flyctl deploy -c fly/api.toml --image "$PREV"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ============================================================
  # IEFA  ── check → build → deploy
  # ============================================================
  check-iefa:
    needs: [changes]
    if: needs.changes.outputs.iefa == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile

      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/portal
        env:
          VITE_IEFA_SUPABASE_URL: ${{ vars.VITE_IEFA_SUPABASE_URL }}
          VITE_IEFA_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY }}

  build-iefa:
    needs: check-iefa
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Login to Fly Registry
        run: echo "${{ secrets.FLY_API_TOKEN }}" | docker login registry.fly.io -u x --password-stdin

      - name: Generate tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          targets: iefa
          push: true
          set: |
            iefa.tags=registry.fly.io/iefa:${{ steps.meta.outputs.tag }}
            iefa.tags=registry.fly.io/iefa:latest
            iefa.args.VITE_IEFA_SUPABASE_URL=${{ vars.VITE_IEFA_SUPABASE_URL }}
            iefa.args.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY }}

  deploy-iefa:
    needs: build-iefa
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    concurrency:
      group: fly-deploy-iefa-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy
        run: flyctl deploy -c fly/iefa.toml --image registry.fly.io/iefa:${{ needs.build-iefa.outputs.tag }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke test
        run: |
          for i in {1..5}; do
            status="$(curl -fsSL --ipv4 --max-redirs 5 --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "${{ vars.IEFA_HEALTH_URL }}" || true)"
            if [[ "${status:0:1}" == "2" ]]; then echo "✅ IEFA health check passed"; exit 0; fi
            echo "Attempt $i/5 - status: ${status:-(connection error)} - waiting 10s..."; sleep 10
          done
          echo "❌ IEFA health check failed"; exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          PREV=$(flyctl releases -c fly/iefa.toml --json | jq -r '.[1].ImageRef // empty')
          [[ -n "$PREV" ]] && flyctl deploy -c fly/iefa.toml --image "$PREV"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ============================================================
  # SISUB  ── check → build → deploy
  # ============================================================
  check-sisub:
    needs: [changes]
    if: needs.changes.outputs.sisub == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile

      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/sisub
        env:
          VITE_SISUB_SUPABASE_URL: ${{ vars.VITE_SISUB_SUPABASE_URL }}
          VITE_SISUB_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}
          SISUB_SUPABASE_SECRET_KEY: ${{ secrets.SISUB_SUPABASE_SECRET_KEY }}

  build-sisub:
    needs: check-sisub
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Login to Fly Registry
        run: echo "${{ secrets.FLY_API_TOKEN }}" | docker login registry.fly.io -u x --password-stdin

      - name: Generate tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          targets: sisub
          push: true
          set: |
            sisub.tags=registry.fly.io/sisub:${{ steps.meta.outputs.tag }}
            sisub.tags=registry.fly.io/sisub:latest
            sisub.args.VITE_SISUB_SUPABASE_URL=${{ vars.VITE_SISUB_SUPABASE_URL }}
            sisub.args.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}

  deploy-sisub:
    needs: build-sisub
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    concurrency:
      group: fly-deploy-sisub-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Set Fly secrets
        run: |
          flyctl --config fly/sisub.toml secrets set \
            VITE_SISUB_SUPABASE_URL="${{ vars.VITE_SISUB_SUPABASE_URL }}" \
            SISUB_SUPABASE_SECRET_KEY="${{ secrets.SISUB_SUPABASE_SECRET_KEY }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy -c fly/sisub.toml --image registry.fly.io/sisub:${{ needs.build-sisub.outputs.tag }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke test
        run: |
          for i in {1..5}; do
            status="$(curl -fsSL --ipv4 --max-redirs 5 --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "${{ vars.SISUB_HEALTH_URL }}" || true)"
            if [[ "${status:0:1}" == "2" ]]; then echo "✅ SISUB health check passed"; exit 0; fi
            echo "Attempt $i/5 - status: ${status:-(connection error)} - waiting 10s..."; sleep 10
          done
          echo "❌ SISUB health check failed"; exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          PREV=$(flyctl releases -c fly/sisub.toml --json | jq -r '.[1].ImageRef // empty')
          [[ -n "$PREV" ]] && flyctl deploy -c fly/sisub.toml --image "$PREV"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ============================================================
  # RAG / apps/ai  ── check → build → deploy
  # ============================================================
  check-rag:
    needs: [changes]
    if: needs.changes.outputs.rag == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile

      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/ai
        env:
          SUPABASE_URL: ${{ secrets.RAG_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RAG_SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.RAG_DATABASE_URL }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}

  build-rag:
    needs: check-rag
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Login to Fly Registry
        run: echo "${{ secrets.FLY_API_TOKEN }}" | docker login registry.fly.io -u x --password-stdin

      - name: Generate tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          targets: rag
          push: true
          set: |
            rag.tags=registry.fly.io/iefa-rag:${{ steps.meta.outputs.tag }}
            rag.tags=registry.fly.io/iefa-rag:latest

  deploy-rag:
    needs: build-rag
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    concurrency:
      group: fly-deploy-rag-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Set Fly secrets
        run: |
          flyctl --config fly/rag.toml secrets set \
            SUPABASE_URL="${{ secrets.RAG_SUPABASE_URL }}" \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.RAG_SUPABASE_SERVICE_ROLE_KEY }}" \
            DATABASE_URL="${{ secrets.RAG_DATABASE_URL }}" \
            NVIDIA_API_KEY="${{ secrets.NVIDIA_API_KEY }}" \
            NVIDIA_BASE_URL="${{ vars.NVIDIA_BASE_URL }}" \
            LLM_MODEL="${{ vars.LLM_MODEL }}" \
            EMB_MODEL="${{ vars.EMB_MODEL }}" \
            NVIDIA_RERANK_MODEL="${{ vars.NVIDIA_RERANK_MODEL }}" \
            LANGCHAIN_API_KEY="${{ secrets.LANGCHAIN_API_KEY }}" \
            LANGCHAIN_TRACING_V2="true" \
            LANGCHAIN_PROJECT="atlas-aci"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy -c fly/rag.toml --image registry.fly.io/iefa-rag:${{ needs.build-rag.outputs.tag }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke test
        run: |
          for i in {1..5}; do
            status="$(curl -fsSL --ipv4 --max-redirs 5 --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "${{ vars.RAG_HEALTH_URL }}" || true)"
            if [[ "${status:0:1}" == "2" ]]; then echo "✅ RAG health check passed"; exit 0; fi
            echo "Attempt $i/5 - status: ${status:-(connection error)} - waiting 10s..."; sleep 10
          done
          echo "❌ RAG health check failed"; exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          PREV=$(flyctl releases -c fly/rag.toml --json | jq -r '.[1].ImageRef // empty')
          [[ -n "$PREV" ]] && flyctl deploy -c fly/rag.toml --image "$PREV"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ============================================================
  # DOCS  ── check → build → deploy
  # ============================================================
  check-docs:
    needs: [changes]
    if: needs.changes.outputs.docs == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile

      - name: Lint · types
        run: bunx turbo run lint typecheck --filter=./apps/docs

  build-docs:
    needs: check-docs
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Login to Fly Registry
        run: echo "${{ secrets.FLY_API_TOKEN }}" | docker login registry.fly.io -u x --password-stdin

      - name: Generate tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          targets: docs
          push: true
          set: |
            docs.tags=registry.fly.io/iefa-docs:${{ steps.meta.outputs.tag }}
            docs.tags=registry.fly.io/iefa-docs:latest

  deploy-docs:
    needs: build-docs
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    concurrency:
      group: fly-deploy-docs-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy
        run: flyctl deploy -c fly/docs.toml --image registry.fly.io/iefa-docs:${{ needs.build-docs.outputs.tag }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke test
        run: |
          for i in {1..5}; do
            status="$(curl -fsSL --ipv4 --max-redirs 5 --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "${{ vars.DOCS_HEALTH_URL }}" || true)"
            if [[ "${status:0:1}" == "2" ]]; then echo "✅ DOCS health check passed"; exit 0; fi
            echo "Attempt $i/5 - status: ${status:-(connection error)} - waiting 10s..."; sleep 10
          done
          echo "❌ DOCS health check failed"; exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          PREV=$(flyctl releases -c fly/docs.toml --json | jq -r '.[1].ImageRef // empty')
          [[ -n "$PREV" ]] && flyctl deploy -c fly/docs.toml --image "$PREV"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
