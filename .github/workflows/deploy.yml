name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  # ============================================
  # DETECT CHANGES
  # ============================================
  changes:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      api: ${{ steps.filter.outputs.api }}
      portal: ${{ steps.filter.outputs.portal }}
      sisub: ${{ steps.filter.outputs.sisub }}
      docs: ${{ steps.filter.outputs.docs }}
      ai: ${{ steps.filter.outputs.ai }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'turbo.json'
            portal:
              - 'apps/portal/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'turbo.json'
            sisub:
              - 'apps/sisub/**'
              - 'packages/database/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'turbo.json'
            docs:
              - 'apps/docs/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'turbo.json'
            ai:
              - 'apps/ai/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'turbo.json'

  # ============================================================
  # API ── check → build → deploy
  # ============================================================

  check-api:
    needs: [changes]
    if: needs.changes.outputs.api == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile

      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/api
        env:
          API_SUPABASE_URL: ${{ vars.API_SUPABASE_URL }}
          API_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.API_SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}

  build-api:
    needs: check-api
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Login to Fly Registry
        run: echo "${{ secrets.FLY_API_TOKEN }}" | docker login registry.fly.io -u x --password-stdin

      - name: Generate tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          files: ./docker-bake.hcl
          targets: api
          push: true
          set: |
            api.tags=registry.fly.io/iefa-api:${{ steps.meta.outputs.tag }}
            api.tags=registry.fly.io/iefa-api:latest

  deploy-api:
    needs: build-api
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    concurrency:
      group: fly-deploy-api-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Set Fly secrets
        run: |
          flyctl --config fly/api.toml secrets set \
            API_PORT=${{ vars.API_PORT }} \
            API_SUPABASE_SERVICE_ROLE_KEY=${{ secrets.API_SUPABASE_SERVICE_ROLE_KEY }} \
            API_SUPABASE_URL=${{ vars.API_SUPABASE_URL }} \
            ADMIN_SECRET=${{ secrets.ADMIN_SECRET }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy -c fly/api.toml --image registry.fly.io/iefa-api:${{ needs.build-api.outputs.tag }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke test
        run: |
          for i in {1..20}; do
            if curl -fsS "${{ vars.API_HEALTH_URL }}" > /dev/null; then
              echo "✅ Health check passed"; exit 0
            fi
            sleep 10
          done
          echo "❌ Health check failed"; exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          PREV=$(flyctl releases -c fly/api.toml --json | jq -r '.[1].ImageRef // empty')
          [[ -n "$PREV" ]] && flyctl deploy -c fly/api.toml --image "$PREV"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ============================================================
  # PORTAL  ── check → build → deploy
  # ============================================================
  check-portal:
    needs: [changes]
    if: needs.changes.outputs.portal == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile

      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/portal
        env:
          VITE_IEFA_SUPABASE_URL: ${{ vars.VITE_IEFA_SUPABASE_URL }}
          VITE_IEFA_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY }}

  build-portal:
    needs: check-portal
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Login to Fly Registry
        run: echo "${{ secrets.FLY_API_TOKEN }}" | docker login registry.fly.io -u x --password-stdin

      - name: Generate tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          files: ./docker-bake.hcl
          targets: portal
          push: true
          set: |
            portal.tags=registry.fly.io/portal:${{ steps.meta.outputs.tag }}
            portal.tags=registry.fly.io/portal:latest
            portal.args.VITE_IEFA_SUPABASE_URL=${{ vars.VITE_IEFA_SUPABASE_URL }}
            portal.args.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY }}

  deploy-portal:
    needs: build-portal
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    concurrency:
      group: fly-deploy-portal-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy
        run: flyctl deploy -c fly/portal.toml --image registry.fly.io/portal:${{ needs.build-portal.outputs.tag }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke test
        run: |
          for i in {1..5}; do
            status="$(curl -fsSL --ipv4 --max-redirs 5 --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "${{ vars.IEFA_HEALTH_URL }}" || true)"
            if [[ "${status:0:1}" == "2" ]]; then echo "✅ portal health check passed"; exit 0; fi
            echo "Attempt $i/5 - status: ${status:-(connection error)} - waiting 10s..."; sleep 10
          done
          echo "❌ portal health check failed"; exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          PREV=$(flyctl releases -c fly/portal.toml --json | jq -r '.[1].ImageRef // empty')
          [[ -n "$PREV" ]] && flyctl deploy -c fly/portal.toml --image "$PREV"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ============================================================
  # SISUB  ── check → build → deploy
  # ============================================================
  check-sisub:
    needs: [changes]
    if: needs.changes.outputs.sisub == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile

      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/sisub
        env:
          VITE_SISUB_SUPABASE_URL: ${{ vars.VITE_SISUB_SUPABASE_URL }}
          VITE_SISUB_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}
          SISUB_SUPABASE_SECRET_KEY: ${{ secrets.SISUB_SUPABASE_SECRET_KEY }}

  build-sisub:
    needs: check-sisub
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Login to Fly Registry
        run: echo "${{ secrets.FLY_API_TOKEN }}" | docker login registry.fly.io -u x --password-stdin

      - name: Generate tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          files: ./docker-bake.hcl
          targets: sisub
          push: true
          set: |
            sisub.tags=registry.fly.io/sisub:${{ steps.meta.outputs.tag }}
            sisub.tags=registry.fly.io/sisub:latest
            sisub.args.VITE_SISUB_SUPABASE_URL=${{ vars.VITE_SISUB_SUPABASE_URL }}
            sisub.args.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}

  deploy-sisub:
    needs: build-sisub
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    concurrency:
      group: fly-deploy-sisub-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Set Fly secrets
        run: |
          flyctl --config fly/sisub.toml secrets set \
            VITE_SISUB_SUPABASE_URL="${{ vars.VITE_SISUB_SUPABASE_URL }}" \
            SISUB_SUPABASE_SECRET_KEY="${{ secrets.SISUB_SUPABASE_SECRET_KEY }}" \
            ADMIN_SECRET="${{ secrets.ADMIN_SECRET }}" \
            OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            ANALYTICS_LLM_MODEL="${{ vars.ANALYTICS_LLM_MODEL }}" \
            IEFA_API_BASE_URL="${{ vars.IEFA_API_BASE_URL }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy -c fly/sisub.toml --image registry.fly.io/sisub:${{ needs.build-sisub.outputs.tag }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke test
        run: |
          for i in {1..5}; do
            status="$(curl -fsSL --ipv4 --max-redirs 5 --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "${{ vars.SISUB_HEALTH_URL }}" || true)"
            if [[ "${status:0:1}" == "2" ]]; then echo "✅ SISUB health check passed"; exit 0; fi
            echo "Attempt $i/5 - status: ${status:-(connection error)} - waiting 10s..."; sleep 10
          done
          echo "❌ SISUB health check failed"; exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          PREV=$(flyctl releases -c fly/sisub.toml --json | jq -r '.[1].ImageRef // empty')
          [[ -n "$PREV" ]] && flyctl deploy -c fly/sisub.toml --image "$PREV"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ============================================================
  # AI / apps/ai  ── check → build → deploy
  # ============================================================
  check-ai:
    needs: [changes]
    if: needs.changes.outputs.ai == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile

      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/ai
        env:
          SUPABASE_URL: ${{ secrets.RAG_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RAG_SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.RAG_DATABASE_URL }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}

  build-ai:
    needs: check-ai
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Login to Fly Registry
        run: echo "${{ secrets.FLY_API_TOKEN }}" | docker login registry.fly.io -u x --password-stdin

      - name: Generate tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          files: ./docker-bake.hcl
          targets: ai
          push: true
          set: |
            ai.tags=registry.fly.io/iefa-ai:${{ steps.meta.outputs.tag }}
            ai.tags=registry.fly.io/iefa-ai:latest

  deploy-ai:
    needs: build-ai
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    concurrency:
      group: fly-deploy-ai-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Set Fly secrets
        run: |
          flyctl --config fly/ai.toml secrets set \
            SUPABASE_URL="${{ secrets.RAG_SUPABASE_URL }}" \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.RAG_SUPABASE_SERVICE_ROLE_KEY }}" \
            DATABASE_URL="${{ secrets.RAG_DATABASE_URL }}" \
            NVIDIA_API_KEY="${{ secrets.NVIDIA_API_KEY }}" \
            NVIDIA_BASE_URL="${{ vars.NVIDIA_BASE_URL }}" \
            LLM_MODEL="${{ vars.LLM_MODEL }}" \
            EMB_MODEL="${{ vars.EMB_MODEL }}" \
            NVIDIA_RERANK_MODEL="${{ vars.NVIDIA_RERANK_MODEL }}" \
            LANGCHAIN_API_KEY="${{ secrets.LANGCHAIN_API_KEY }}" \
            LANGCHAIN_TRACING_V2="true" \
            LANGCHAIN_PROJECT="atlas-aci"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy -c fly/ai.toml --image registry.fly.io/iefa-ai:${{ needs.build-ai.outputs.tag }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke test
        run: |
          for i in {1..5}; do
            status="$(curl -fsSL --ipv4 --max-redirs 5 --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "${{ vars.RAG_HEALTH_URL }}" || true)"
            if [[ "${status:0:1}" == "2" ]]; then echo "✅ ai health check passed"; exit 0; fi
            echo "Attempt $i/5 - status: ${status:-(connection error)} - waiting 10s..."; sleep 10
          done
          echo "❌ ai health check failed"; exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          PREV=$(flyctl releases -c fly/ai.toml --json | jq -r '.[1].ImageRef // empty')
          [[ -n "$PREV" ]] && flyctl deploy -c fly/ai.toml --image "$PREV"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ============================================================
  # DOCS  ── check → build → deploy
  # ============================================================
  check-docs:
    needs: [changes]
    if: needs.changes.outputs.docs == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile

      - name: Lint · types
        run: bunx turbo run lint typecheck --filter=./apps/docs

  build-docs:
    needs: check-docs
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Login to Fly Registry
        run: echo "${{ secrets.FLY_API_TOKEN }}" | docker login registry.fly.io -u x --password-stdin

      - name: Generate tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          files: ./docker-bake.hcl
          targets: docs
          push: true
          set: |
            docs.tags=registry.fly.io/iefa-docs:${{ steps.meta.outputs.tag }}
            docs.tags=registry.fly.io/iefa-docs:latest

  deploy-docs:
    needs: build-docs
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    concurrency:
      group: fly-deploy-docs-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy
        run: flyctl deploy -c fly/docs.toml --image registry.fly.io/iefa-docs:${{ needs.build-docs.outputs.tag }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke test
        run: |
          for i in {1..5}; do
            status="$(curl -fsSL --ipv4 --max-redirs 5 --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "${{ vars.DOCS_HEALTH_URL }}" || true)"
            if [[ "${status:0:1}" == "2" ]]; then echo "✅ DOCS health check passed"; exit 0; fi
            echo "Attempt $i/5 - status: ${status:-(connection error)} - waiting 10s..."; sleep 10
          done
          echo "❌ DOCS health check failed"; exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          PREV=$(flyctl releases -c fly/docs.toml --json | jq -r '.[1].ImageRef // empty')
          [[ -n "$PREV" ]] && flyctl deploy -c fly/docs.toml --image "$PREV"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ============================================================
  # TODO: SISUB-MCP  ── check → build → deploy
  # ============================================================
  # Pending: Dockerfile target, docker-bake target, fly/sisub-mcp.toml
  # Paths filter: 'apps/sisub-mcp/**' + 'packages/database/**'
  # Runtime secrets: VITE_SISUB_SUPABASE_URL, SISUB_SUPABASE_SECRET_KEY,
  #                  SISUB_SUPABASE_ANON_KEY, MCP_PORT, MCP_TRANSPORT
