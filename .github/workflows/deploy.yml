name: CI/CD
# force-redeploy: 2026-04-23

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_api:
        description: 'Force deploy API'
        type: boolean
        default: false
      force_portal:
        description: 'Force deploy portal'
        type: boolean
        default: false
      force_sisub:
        description: 'Force deploy sisub'
        type: boolean
        default: false
      force_docs:
        description: 'Force deploy docs'
        type: boolean
        default: false
      force_forms:
        description: 'Force deploy forms'
        type: boolean
        default: false
      force_alpha:
        description: 'Force deploy Projeto α'
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

jobs:
  # ============================================
  # DETECT CHANGES
  # ============================================
  changes:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      api: ${{ steps.final.outputs.api }}
      portal: ${{ steps.final.outputs.portal }}
      sisub: ${{ steps.final.outputs.sisub }}
      forms: ${{ steps.final.outputs.forms }}
      docs: ${{ steps.final.outputs.docs }}
      alpha: ${{ steps.final.outputs.alpha }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'turbo.json'
            portal:
              - 'apps/portal/**'
              - 'packages/hono-client/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'turbo.json'
            sisub:
              - 'apps/sisub/**'
              - 'packages/database/**'
              - 'packages/hono-client/**'
              - 'packages/alpha-client/**'
              - 'packages/pbac/**'
              - 'packages/sisub-domain/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'turbo.json'
            forms:
              - 'apps/forms/**'
              - 'packages/database/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'turbo.json'
            docs:
              - 'apps/docs/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'turbo.json'
            alpha:
              - 'apps/alpha/**'
              - 'packages/alpha-client/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'turbo.json'

      # workflow_dispatch: use force_* inputs; push: use paths filter
      - name: Resolve outputs
        id: final
        env:
          EVENT_NAME: ${{ github.event_name }}
          FORCE_API: ${{ inputs.force_api }}
          FORCE_PORTAL: ${{ inputs.force_portal }}
          FORCE_SISUB: ${{ inputs.force_sisub }}
          FORCE_DOCS: ${{ inputs.force_docs }}
          FORCE_FORMS: ${{ inputs.force_forms }}
          FORCE_ALPHA: ${{ inputs.force_alpha }}
          FILTER_API: ${{ steps.filter.outputs.api }}
          FILTER_PORTAL: ${{ steps.filter.outputs.portal }}
          FILTER_SISUB: ${{ steps.filter.outputs.sisub }}
          FILTER_FORMS: ${{ steps.filter.outputs.forms }}
          FILTER_DOCS: ${{ steps.filter.outputs.docs }}
          FILTER_ALPHA: ${{ steps.filter.outputs.alpha }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "api=$FORCE_API"       >> $GITHUB_OUTPUT
            echo "portal=$FORCE_PORTAL" >> $GITHUB_OUTPUT
            echo "sisub=$FORCE_SISUB"   >> $GITHUB_OUTPUT
            echo "forms=$FORCE_FORMS"   >> $GITHUB_OUTPUT
            echo "docs=$FORCE_DOCS"     >> $GITHUB_OUTPUT
            echo "alpha=$FORCE_ALPHA"   >> $GITHUB_OUTPUT
          else
            echo "api=$FILTER_API"       >> $GITHUB_OUTPUT
            echo "portal=$FILTER_PORTAL" >> $GITHUB_OUTPUT
            echo "sisub=$FILTER_SISUB"   >> $GITHUB_OUTPUT
            echo "forms=$FILTER_FORMS"   >> $GITHUB_OUTPUT
            echo "docs=$FILTER_DOCS"     >> $GITHUB_OUTPUT
            echo "alpha=$FILTER_ALPHA"   >> $GITHUB_OUTPUT
          fi

  # ============================================================
  # API ── check → build → deploy
  # ============================================================
  check-api:
    needs: [changes]
    if: needs.changes.outputs.api == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/api
        env:
          API_SUPABASE_URL: ${{ vars.API_SUPABASE_URL }}
          API_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.API_SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}

  build-api:
    needs: check-api
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Login to Fly Registry
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: echo "$FLY_API_TOKEN" | docker login registry.fly.io -u x --password-stdin

      - name: Generate tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          files: ./docker-bake.hcl
          targets: api
          push: true
          set: |
            api.tags=registry.fly.io/iefa-api:${{ steps.meta.outputs.tag }}
            api.tags=registry.fly.io/iefa-api:latest

  deploy-api:
    needs: build-api
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    concurrency:
      group: fly-deploy-api-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Set Fly secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          V_API_PORT: ${{ vars.API_PORT }}
          V_SUPABASE_URL: ${{ vars.API_SUPABASE_URL }}
          S_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.API_SUPABASE_SERVICE_ROLE_KEY }}
          S_ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          flyctl --config fly/api.toml secrets set \
            "API_PORT=$V_API_PORT" \
            "API_SUPABASE_URL=$V_SUPABASE_URL" \
            "API_SUPABASE_SERVICE_ROLE_KEY=$S_SUPABASE_SERVICE_ROLE_KEY" \
            "ADMIN_SECRET=$S_ADMIN_SECRET"

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          IMAGE_TAG: ${{ needs.build-api.outputs.tag }}
        run: flyctl deploy -c fly/api.toml --image "registry.fly.io/iefa-api:$IMAGE_TAG" --wait-timeout 300

      - name: Smoke test
        env:
          HEALTH_URL: ${{ vars.API_HEALTH_URL }}
        run: |
          for i in {1..10}; do
            status="$(curl -fsSL --ipv4 --max-redirs 5 --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)"
            if [[ "${status:0:1}" == "2" ]]; then echo "✅ API health check passed"; exit 0; fi
            echo "Attempt $i/10 - status: ${status:-(connection error)} - waiting 10s..."; sleep 10
          done
          echo "❌ API health check failed"; exit 1

      - name: Rollback on failure
        if: failure()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          PREV=$(flyctl releases -c fly/api.toml --json | jq -r '.[1].ImageRef // empty')
          if [[ -z "$PREV" ]]; then echo "⚠️ No previous release to roll back to"; exit 0; fi
          flyctl deploy -c fly/api.toml --image "$PREV" --wait-timeout 300 || true

  # ============================================================
  # PORTAL  ── check → build → deploy
  # ============================================================
  check-portal:
    needs: [changes]
    if: needs.changes.outputs.portal == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/portal
        env:
          VITE_IEFA_SUPABASE_URL: ${{ vars.VITE_IEFA_SUPABASE_URL }}
          VITE_IEFA_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY }}

  build-portal:
    needs: check-portal
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Login to Fly Registry
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: echo "$FLY_API_TOKEN" | docker login registry.fly.io -u x --password-stdin

      - name: Generate tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          files: ./docker-bake.hcl
          targets: portal
          push: true
          set: |
            portal.tags=registry.fly.io/iefa:${{ steps.meta.outputs.tag }}
            portal.tags=registry.fly.io/iefa:latest
            portal.args.VITE_IEFA_SUPABASE_URL=${{ vars.VITE_SISUB_SUPABASE_URL }}
            portal.args.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}

  deploy-portal:
    needs: build-portal
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    concurrency:
      group: fly-deploy-portal-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Set Fly secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          V_IEFA_SUPABASE_URL: ${{ vars.VITE_SISUB_SUPABASE_URL }}
          S_IEFA_SUPABASE_SECRET_KEY: ${{ secrets.SISUB_SUPABASE_SECRET_KEY }}
        run: |
          flyctl secrets set --config fly/portal.toml \
            "VITE_IEFA_SUPABASE_URL=$V_IEFA_SUPABASE_URL" \
            "IEFA_SUPABASE_SECRET_KEY=$S_IEFA_SUPABASE_SECRET_KEY"

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          IMAGE_TAG: ${{ needs.build-portal.outputs.tag }}
        run: flyctl deploy -c fly/portal.toml --image "registry.fly.io/iefa:$IMAGE_TAG" --wait-timeout 300

      - name: Smoke test
        env:
          HEALTH_URL: ${{ vars.IEFA_HEALTH_URL }}
        run: |
          for i in {1..10}; do
            status="$(curl -fsSL --ipv4 --max-redirs 5 --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)"
            if [[ "${status:0:1}" == "2" ]]; then echo "✅ portal health check passed"; exit 0; fi
            echo "Attempt $i/10 - status: ${status:-(connection error)} - waiting 10s..."; sleep 10
          done
          echo "❌ portal health check failed"; exit 1

      - name: Rollback on failure
        if: failure()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          PREV=$(flyctl releases -c fly/portal.toml --json | jq -r '.[1].ImageRef // empty')
          if [[ -z "$PREV" ]]; then echo "⚠️ No previous release to roll back to"; exit 0; fi
          flyctl deploy -c fly/portal.toml --image "$PREV" --wait-timeout 300 || true

  # ============================================================
  # SISUB  ── check → build → deploy
  # ============================================================
  check-sisub:
    needs: [changes]
    if: needs.changes.outputs.sisub == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/sisub
        env:
          VITE_SISUB_SUPABASE_URL: ${{ vars.VITE_SISUB_SUPABASE_URL }}
          VITE_SISUB_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}
          SISUB_SUPABASE_SECRET_KEY: ${{ secrets.SISUB_SUPABASE_SECRET_KEY }}

  build-sisub:
    needs: check-sisub
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Login to Fly Registry
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: echo "$FLY_API_TOKEN" | docker login registry.fly.io -u x --password-stdin

      - name: Generate tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          files: ./docker-bake.hcl
          targets: sisub
          push: true
          set: |
            sisub.tags=registry.fly.io/sisub:${{ steps.meta.outputs.tag }}
            sisub.tags=registry.fly.io/sisub:latest
            sisub.args.VITE_SISUB_SUPABASE_URL=${{ vars.VITE_SISUB_SUPABASE_URL }}
            sisub.args.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}

  deploy-sisub:
    needs: build-sisub
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    concurrency:
      group: fly-deploy-sisub-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Set Fly secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          V_SISUB_SUPABASE_URL: ${{ vars.VITE_SISUB_SUPABASE_URL }}
          V_ANALYTICS_LLM_MODEL: ${{ vars.ANALYTICS_LLM_MODEL }}
          V_IEFA_API_BASE_URL: ${{ vars.IEFA_API_BASE_URL }}
          S_SISUB_SUPABASE_SECRET_KEY: ${{ secrets.SISUB_SUPABASE_SECRET_KEY }}
          S_ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          S_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          flyctl --config fly/sisub.toml secrets set \
            "VITE_SISUB_SUPABASE_URL=$V_SISUB_SUPABASE_URL" \
            "SISUB_SUPABASE_SECRET_KEY=$S_SISUB_SUPABASE_SECRET_KEY" \
            "ADMIN_SECRET=$S_ADMIN_SECRET" \
            "OPENROUTER_API_KEY=$S_OPENROUTER_API_KEY" \
            "ANALYTICS_LLM_MODEL=$V_ANALYTICS_LLM_MODEL" \
            "IEFA_API_BASE_URL=$V_IEFA_API_BASE_URL"

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          IMAGE_TAG: ${{ needs.build-sisub.outputs.tag }}
        run: flyctl deploy -c fly/sisub.toml --image "registry.fly.io/sisub:$IMAGE_TAG" --wait-timeout 300

      - name: Smoke test
        env:
          HEALTH_URL: ${{ vars.SISUB_HEALTH_URL }}
        run: |
          for i in {1..10}; do
            status="$(curl -fsSL --ipv4 --max-redirs 5 --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)"
            if [[ "${status:0:1}" == "2" ]]; then echo "✅ SISUB health check passed"; exit 0; fi
            echo "Attempt $i/10 - status: ${status:-(connection error)} - waiting 10s..."; sleep 10
          done
          echo "❌ SISUB health check failed"; exit 1

      - name: Rollback on failure
        if: failure()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          PREV=$(flyctl releases -c fly/sisub.toml --json | jq -r '.[1].ImageRef // empty')
          if [[ -z "$PREV" ]]; then echo "⚠️ No previous release to roll back to"; exit 0; fi
          flyctl deploy -c fly/sisub.toml --image "$PREV" --wait-timeout 300 || true

  # ============================================================
  # FORMS  ── check → build → deploy
  # ============================================================
  check-forms:
    needs: [changes]
    if: needs.changes.outputs.forms == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/forms
        env:
          VITE_IEFA_SUPABASE_URL: ${{ vars.VITE_IEFA_SUPABASE_URL }}
          VITE_IEFA_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY }}

  build-forms:
    needs: check-forms
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Login to Fly Registry
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: echo "$FLY_API_TOKEN" | docker login registry.fly.io -u x --password-stdin

      - name: Generate tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          files: ./docker-bake.hcl
          targets: forms
          push: true
          set: |
            forms.tags=registry.fly.io/iefa-forms:${{ steps.meta.outputs.tag }}
            forms.tags=registry.fly.io/iefa-forms:latest
            forms.args.VITE_IEFA_SUPABASE_URL=${{ vars.VITE_SISUB_SUPABASE_URL }}
            forms.args.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}

  deploy-forms:
    needs: build-forms
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    concurrency:
      group: fly-deploy-forms-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Set Fly secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          V_IEFA_SUPABASE_URL: ${{ vars.VITE_SISUB_SUPABASE_URL }}
          S_IEFA_SUPABASE_SECRET_KEY: ${{ secrets.SISUB_SUPABASE_SECRET_KEY }}
        run: |
          flyctl secrets set --config fly/forms.toml \
            "VITE_IEFA_SUPABASE_URL=$V_IEFA_SUPABASE_URL" \
            "IEFA_SUPABASE_SECRET_KEY=$S_IEFA_SUPABASE_SECRET_KEY"

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          IMAGE_TAG: ${{ needs.build-forms.outputs.tag }}
        run: flyctl deploy -c fly/forms.toml --image "registry.fly.io/iefa-forms:$IMAGE_TAG" --wait-timeout 300

      - name: Smoke test
        env:
          HEALTH_URL: ${{ vars.FORMS_HEALTH_URL }}
        run: |
          for i in {1..10}; do
            status="$(curl -fsSL --ipv4 --max-redirs 5 --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)"
            if [[ "${status:0:1}" == "2" ]]; then echo "✅ forms health check passed"; exit 0; fi
            echo "Attempt $i/10 - status: ${status:-(connection error)} - waiting 10s..."; sleep 10
          done
          echo "❌ forms health check failed"; exit 1

      - name: Rollback on failure
        if: failure()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          PREV=$(flyctl releases -c fly/forms.toml --json | jq -r '.[1].ImageRef // empty')
          if [[ -z "$PREV" ]]; then echo "⚠️ No previous release to roll back to"; exit 0; fi
          flyctl deploy -c fly/forms.toml --image "$PREV" --wait-timeout 300 || true

  # ============================================================
  # Projeto α / apps/alpha  ── check → build → deploy
  # ============================================================
  check-alpha:
    needs: [changes]
    if: needs.changes.outputs.alpha == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/alpha
        env:
          SUPABASE_URL: ${{ secrets.RAG_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RAG_SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.RAG_DATABASE_URL }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}

  build-alpha:
    needs: check-alpha
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Ensure Fly app exists
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl apps create iefa-ai || true

      - name: Login to Fly Registry
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: echo "$FLY_API_TOKEN" | docker login registry.fly.io -u x --password-stdin

      - name: Generate tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          files: ./docker-bake.hcl
          targets: alpha
          push: true
          set: |
            alpha.tags=registry.fly.io/iefa-ai:${{ steps.meta.outputs.tag }}
            alpha.tags=registry.fly.io/iefa-ai:latest

  deploy-alpha:
    needs: build-alpha
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    concurrency:
      group: fly-deploy-alpha-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Set Fly secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          V_NVIDIA_BASE_URL: ${{ vars.NVIDIA_BASE_URL }}
          V_LLM_MODEL: ${{ vars.LLM_MODEL }}
          V_EMB_MODEL: ${{ vars.EMB_MODEL }}
          V_NVIDIA_RERANK_MODEL: ${{ vars.NVIDIA_RERANK_MODEL }}
          S_SUPABASE_URL: ${{ secrets.RAG_SUPABASE_URL }}
          S_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RAG_SUPABASE_SERVICE_ROLE_KEY }}
          S_DATABASE_URL: ${{ secrets.RAG_DATABASE_URL }}
          S_NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          S_LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
        run: |
          flyctl --config fly/alpha.toml secrets set \
            "SUPABASE_URL=$S_SUPABASE_URL" \
            "SUPABASE_SERVICE_ROLE_KEY=$S_SUPABASE_SERVICE_ROLE_KEY" \
            "DATABASE_URL=$S_DATABASE_URL" \
            "NVIDIA_API_KEY=$S_NVIDIA_API_KEY" \
            "NVIDIA_BASE_URL=$V_NVIDIA_BASE_URL" \
            "LLM_MODEL=$V_LLM_MODEL" \
            "EMB_MODEL=$V_EMB_MODEL" \
            "NVIDIA_RERANK_MODEL=$V_NVIDIA_RERANK_MODEL" \
            "LANGCHAIN_API_KEY=$S_LANGCHAIN_API_KEY" \
            "LANGCHAIN_TRACING_V2=true" \
            "LANGCHAIN_PROJECT=alpha-aci"

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          IMAGE_TAG: ${{ needs.build-alpha.outputs.tag }}
        run: flyctl deploy -c fly/alpha.toml --image "registry.fly.io/iefa-ai:$IMAGE_TAG" --wait-timeout 300

      - name: Smoke test
        env:
          HEALTH_URL: ${{ vars.RAG_HEALTH_URL }}
        run: |
          for i in {1..10}; do
            status="$(curl -fsSL --ipv4 --max-redirs 5 --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)"
            if [[ "${status:0:1}" == "2" ]]; then echo "✅ AI health check passed"; exit 0; fi
            echo "Attempt $i/10 - status: ${status:-(connection error)} - waiting 10s..."; sleep 10
          done
          echo "❌ AI health check failed"; exit 1

      - name: Rollback on failure
        if: failure()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          PREV=$(flyctl releases -c fly/alpha.toml --json | jq -r '.[1].ImageRef // empty')
          if [[ -z "$PREV" ]]; then echo "⚠️ No previous release to roll back to"; exit 0; fi
          flyctl deploy -c fly/alpha.toml --image "$PREV" --wait-timeout 300 || true

  # ============================================================
  # DOCS  ── check → build → deploy
  # ============================================================
  check-docs:
    needs: [changes]
    if: needs.changes.outputs.docs == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types
        run: bunx turbo run lint typecheck --filter=./apps/docs

  build-docs:
    needs: check-docs
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Login to Fly Registry
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: echo "$FLY_API_TOKEN" | docker login registry.fly.io -u x --password-stdin

      - name: Generate tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          files: ./docker-bake.hcl
          targets: docs
          push: true
          set: |
            docs.tags=registry.fly.io/iefa-docs:${{ steps.meta.outputs.tag }}
            docs.tags=registry.fly.io/iefa-docs:latest

  deploy-docs:
    needs: build-docs
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    concurrency:
      group: fly-deploy-docs-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          IMAGE_TAG: ${{ needs.build-docs.outputs.tag }}
        run: flyctl deploy -c fly/docs.toml --image "registry.fly.io/iefa-docs:$IMAGE_TAG" --wait-timeout 300

      - name: Smoke test
        env:
          HEALTH_URL: ${{ vars.DOCS_HEALTH_URL }}
        run: |
          for i in {1..10}; do
            status="$(curl -fsSL --ipv4 --max-redirs 5 --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)"
            if [[ "${status:0:1}" == "2" ]]; then echo "✅ DOCS health check passed"; exit 0; fi
            echo "Attempt $i/10 - status: ${status:-(connection error)} - waiting 10s..."; sleep 10
          done
          echo "❌ DOCS health check failed"; exit 1

      - name: Rollback on failure
        if: failure()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          PREV=$(flyctl releases -c fly/docs.toml --json | jq -r '.[1].ImageRef // empty')
          if [[ -z "$PREV" ]]; then echo "⚠️ No previous release to roll back to"; exit 0; fi
          flyctl deploy -c fly/docs.toml --image "$PREV" --wait-timeout 300 || true

