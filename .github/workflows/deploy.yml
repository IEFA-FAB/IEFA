name: CI/CD
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_api:
        description: "Force deploy API"
        type: boolean
        default: false
      force_portal:
        description: "Force deploy portal"
        type: boolean
        default: false
      force_rumaer:
        description: "Force deploy rumaer"
        type: boolean
        default: false
      force_sisub:
        description: "Force deploy sisub"
        type: boolean
        default: false
      force_docs:
        description: "Force deploy docs"
        type: boolean
        default: false
      force_forms:
        description: "Force deploy forms"
        type: boolean
        default: false
      force_5s:
        description: "Force deploy 5S"
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

jobs:
  # ============================================
  # DETECT CHANGES
  # ============================================
  changes:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      api: ${{ steps.final.outputs.api }}
      portal: ${{ steps.final.outputs.portal }}
      rumaer: ${{ steps.final.outputs.rumaer }}
      sisub: ${{ steps.final.outputs.sisub }}
      forms: ${{ steps.final.outputs.forms }}
      docs: ${{ steps.final.outputs.docs }}
      # alpha: ${{ steps.final.outputs.alpha }}
      5s: ${{ steps.final.outputs['5s'] }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_app-build.yml'
              - '.github/workflows/_app-deploy.yml'
              - 'package.json'
              - 'turbo.json'
            portal:
              - 'apps/portal/**'
              - 'packages/hono-client/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_app-build.yml'
              - '.github/workflows/_app-deploy.yml'
              - 'package.json'
              - 'turbo.json'
            rumaer:
              - 'apps/rumaer/**'
              - 'packages/database/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_app-build.yml'
              - '.github/workflows/_app-deploy.yml'
              - 'package.json'
              - 'turbo.json'
            sisub:
              - 'apps/sisub/**'
              - 'packages/database/**'
              - 'packages/hono-client/**'
              - 'packages/alpha-client/**'
              - 'packages/ai-provider/**'
              - 'packages/pbac/**'
              - 'packages/sisub-domain/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_app-build.yml'
              - '.github/workflows/_app-deploy.yml'
              - 'package.json'
              - 'turbo.json'
            forms:
              - 'apps/forms/**'
              - 'packages/database/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_app-build.yml'
              - '.github/workflows/_app-deploy.yml'
              - 'package.json'
              - 'turbo.json'
            docs:
              - 'apps/docs/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_app-build.yml'
              - '.github/workflows/_app-deploy.yml'
              - 'package.json'
              - 'turbo.json'
            # alpha:
            #   - 'apps/alpha/**'
            #   - 'packages/alpha-client/**'
            #   - 'packages/ai-provider/**'
            #   - 'Dockerfile'
            #   - 'docker-bake.hcl'
            #   - '.github/workflows/deploy.yml'
            #   - 'package.json'
            #   - 'turbo.json'
            5s:
              - 'apps/forms/**'
              - 'packages/database/**'
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_app-build.yml'
              - '.github/workflows/_app-deploy.yml'
              - 'package.json'
              - 'turbo.json'

      # workflow_dispatch: use force_* inputs; push: use paths filter
      - name: Resolve outputs
        id: final
        env:
          EVENT_NAME: ${{ github.event_name }}
          FORCE_API: ${{ inputs.force_api }}
          FORCE_PORTAL: ${{ inputs.force_portal }}
          FORCE_RUMAER: ${{ inputs.force_rumaer }}
          FORCE_SISUB: ${{ inputs.force_sisub }}
          FORCE_DOCS: ${{ inputs.force_docs }}
          FORCE_FORMS: ${{ inputs.force_forms }}
          # FORCE_ALPHA: ${{ inputs.force_alpha }}
          FORCE_5S: ${{ inputs.force_5s }}
          FILTER_API: ${{ steps.filter.outputs.api }}
          FILTER_PORTAL: ${{ steps.filter.outputs.portal }}
          FILTER_RUMAER: ${{ steps.filter.outputs.rumaer }}
          FILTER_SISUB: ${{ steps.filter.outputs.sisub }}
          FILTER_FORMS: ${{ steps.filter.outputs.forms }}
          FILTER_DOCS: ${{ steps.filter.outputs.docs }}
          # FILTER_ALPHA: ${{ steps.filter.outputs.alpha }}
          FILTER_5S: ${{ steps.filter.outputs['5s'] }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "api=$FORCE_API"       >> $GITHUB_OUTPUT
            echo "portal=$FORCE_PORTAL" >> $GITHUB_OUTPUT
            echo "rumaer=$FORCE_RUMAER" >> $GITHUB_OUTPUT
            echo "sisub=$FORCE_SISUB"   >> $GITHUB_OUTPUT
            echo "forms=$FORCE_FORMS"   >> $GITHUB_OUTPUT
            echo "docs=$FORCE_DOCS"     >> $GITHUB_OUTPUT
            # echo "alpha=$FORCE_ALPHA"   >> $GITHUB_OUTPUT
            echo "5s=$FORCE_5S"         >> $GITHUB_OUTPUT
          else
            echo "api=$FILTER_API"       >> $GITHUB_OUTPUT
            echo "portal=$FILTER_PORTAL" >> $GITHUB_OUTPUT
            echo "rumaer=$FILTER_RUMAER" >> $GITHUB_OUTPUT
            echo "sisub=$FILTER_SISUB"   >> $GITHUB_OUTPUT
            echo "forms=$FILTER_FORMS"   >> $GITHUB_OUTPUT
            echo "docs=$FILTER_DOCS"     >> $GITHUB_OUTPUT
            # echo "alpha=$FILTER_ALPHA"   >> $GITHUB_OUTPUT
            echo "5s=$FILTER_5S"         >> $GITHUB_OUTPUT
          fi

  # ============================================================
  # WARM DEPS CACHE
  # Builda o estágio `deps` uma vez e popula o scope `deps` do cache gha.
  # Todos os build-<app> dependem deste job e leem esse cache → o `bun install`
  # do monorepo não é refeito por app em cache frio.
  # ============================================================
  warm-deps:
    needs: [changes]
    if: >-
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.portal == 'true' ||
      needs.changes.outputs.rumaer == 'true' ||
      needs.changes.outputs.sisub == 'true' ||
      needs.changes.outputs.forms == 'true' ||
      needs.changes.outputs.docs == 'true' ||
      needs.changes.outputs['5s'] == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Warm deps cache
        uses: docker/bake-action@v7
        with:
          files: ./docker-bake.hcl
          targets: deps
          push: false

  # ============================================================
  # API ── check → build → deploy
  # ============================================================
  check-api:
    needs: [changes]
    if: needs.changes.outputs.api == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/api
        env:
          API_SUPABASE_URL: ${{ vars.API_SUPABASE_URL }}
          API_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.API_SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}

  build-api:
    needs: [check-api, warm-deps]
    uses: ./.github/workflows/_app-build.yml
    with:
      target: api
      image_repo: registry.fly.io/iefa-api
    secrets: inherit

  secrets-api:
    needs: [check-api]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - name: Stage Fly secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          V_API_PORT: ${{ vars.API_PORT }}
          V_SUPABASE_URL: ${{ vars.API_SUPABASE_URL }}
          S_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.API_SUPABASE_SERVICE_ROLE_KEY }}
          S_ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          flyctl --config fly/api.toml secrets set --stage \
            "API_PORT=$V_API_PORT" \
            "API_SUPABASE_URL=$V_SUPABASE_URL" \
            "API_SUPABASE_SERVICE_ROLE_KEY=$S_SUPABASE_SERVICE_ROLE_KEY" \
            "ADMIN_SECRET=$S_ADMIN_SECRET"

  deploy-api:
    needs: [build-api, secrets-api]
    uses: ./.github/workflows/_app-deploy.yml
    with:
      image_repo: registry.fly.io/iefa-api
      image_tag: ${{ needs.build-api.outputs.tag }}
      fly_config: fly/api.toml
      health_url: ${{ vars.API_HEALTH_URL }}
      concurrency_suffix: api
    secrets: inherit

  # ============================================================
  # PORTAL  ── check → build → deploy
  # ============================================================
  check-portal:
    needs: [changes]
    if: needs.changes.outputs.portal == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/portal
        env:
          VITE_IEFA_SUPABASE_URL: ${{ vars.VITE_IEFA_SUPABASE_URL }}
          VITE_IEFA_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY }}

  build-portal:
    needs: [check-portal, warm-deps]
    uses: ./.github/workflows/_app-build.yml
    with:
      target: portal
      image_repo: registry.fly.io/iefa
      bake_set: |
        portal.args.VITE_IEFA_SUPABASE_URL=${{ vars.VITE_SISUB_SUPABASE_URL }}
        portal.args.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}
    secrets: inherit

  secrets-portal:
    needs: [check-portal]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - name: Stage Fly secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          V_IEFA_SUPABASE_URL: ${{ vars.VITE_SISUB_SUPABASE_URL }}
          S_IEFA_SUPABASE_SECRET_KEY: ${{ secrets.SISUB_SUPABASE_SECRET_KEY }}
        run: |
          flyctl secrets set --stage --config fly/portal.toml \
            "VITE_IEFA_SUPABASE_URL=$V_IEFA_SUPABASE_URL" \
            "IEFA_SUPABASE_SECRET_KEY=$S_IEFA_SUPABASE_SECRET_KEY"

  deploy-portal:
    needs: [build-portal, secrets-portal]
    uses: ./.github/workflows/_app-deploy.yml
    with:
      image_repo: registry.fly.io/iefa
      image_tag: ${{ needs.build-portal.outputs.tag }}
      fly_config: fly/portal.toml
      health_url: ${{ vars.IEFA_HEALTH_URL }}
      concurrency_suffix: portal
    secrets: inherit

  # ============================================================
  # RUMAER  ── check → build → deploy
  # Mesmo projeto Supabase do sisub → reutiliza vars/secrets do sisub,
  # mapeados para os nomes VITE_RUMAER_* / RUMAER_SUPABASE_SECRET_KEY.
  # ============================================================
  check-rumaer:
    needs: [changes]
    if: needs.changes.outputs.rumaer == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/rumaer
        env:
          VITE_RUMAER_SUPABASE_URL: ${{ vars.VITE_SISUB_SUPABASE_URL }}
          VITE_RUMAER_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}

  build-rumaer:
    needs: [check-rumaer, warm-deps]
    uses: ./.github/workflows/_app-build.yml
    with:
      target: rumaer
      image_repo: registry.fly.io/iefa-rumaer
      ensure_app: iefa-rumaer
      bake_set: |
        rumaer.args.VITE_RUMAER_SUPABASE_URL=${{ vars.VITE_SISUB_SUPABASE_URL }}
        rumaer.args.VITE_RUMAER_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}
    secrets: inherit

  secrets-rumaer:
    # depende de build-rumaer porque ele roda `ensure_app` (cria o app iefa-rumaer
    # no primeiro deploy); `secrets set --stage` exige que o app já exista.
    needs: [build-rumaer]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - name: Stage Fly secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          V_RUMAER_SUPABASE_URL: ${{ vars.VITE_SISUB_SUPABASE_URL }}
          S_RUMAER_SUPABASE_SECRET_KEY: ${{ secrets.SISUB_SUPABASE_SECRET_KEY }}
        run: |
          flyctl secrets set --stage --config fly/rumaer.toml \
            "VITE_RUMAER_SUPABASE_URL=$V_RUMAER_SUPABASE_URL" \
            "RUMAER_SUPABASE_SECRET_KEY=$S_RUMAER_SUPABASE_SECRET_KEY"

  deploy-rumaer:
    needs: [build-rumaer, secrets-rumaer]
    uses: ./.github/workflows/_app-deploy.yml
    with:
      image_repo: registry.fly.io/iefa-rumaer
      image_tag: ${{ needs.build-rumaer.outputs.tag }}
      fly_config: fly/rumaer.toml
      health_url: https://iefa-rumaer.fly.dev/health
      concurrency_suffix: rumaer
    secrets: inherit

  # ============================================================
  # SISUB  ── check → build → (e2e) → deploy
  # ============================================================
  check-sisub:
    needs: [changes]
    if: needs.changes.outputs.sisub == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types · unit · integration tests
        run: |
          bunx turbo run lint typecheck test:unit test:integration --filter=./apps/sisub
          bunx turbo run test --filter=./packages/pbac
          bunx turbo run test --filter=./packages/sisub-domain
        env:
          VITE_SISUB_SUPABASE_URL: ${{ vars.VITE_SISUB_SUPABASE_URL }}
          VITE_SISUB_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}
          SISUB_SUPABASE_SECRET_KEY: ${{ secrets.SISUB_SUPABASE_SECRET_KEY }}
          ANALYTICS_AI_PROVIDER: ${{ vars.ANALYTICS_AI_PROVIDER }}
          ANALYTICS_AI_MODEL: ${{ vars.ANALYTICS_AI_MODEL }}
          ANALYTICS_AI_API_KEY: ${{ secrets.ANALYTICS_AI_API_KEY }}
          MODULE_CHAT_AI_PROVIDER: ${{ vars.MODULE_CHAT_AI_PROVIDER }}
          MODULE_CHAT_AI_MODEL: ${{ vars.MODULE_CHAT_AI_MODEL }}
          MODULE_CHAT_AI_API_KEY: ${{ secrets.MODULE_CHAT_AI_API_KEY }}

  build-sisub:
    needs: [check-sisub, warm-deps]
    uses: ./.github/workflows/_app-build.yml
    with:
      target: sisub
      image_repo: registry.fly.io/sisub
      # Observability camada 1 (Faro frontend) + camada 3 (sourcemaps) entram como
      # build args — VITE_* são baked no bundle do cliente. Vars vazias → no-op.
      # FARO_SOURCEMAP_API_KEY é secret: o _app-build.yml o injeta como
      # <target>.args.FARO_SOURCEMAP_API_KEY (secrets não são válidos em `with:`).
      # Camada 2 (OTel backend) é runtime, vai no job secrets-sisub.
      bake_set: |
        sisub.args.VITE_SISUB_SUPABASE_URL=${{ vars.VITE_SISUB_SUPABASE_URL }}
        sisub.args.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}
        sisub.args.VITE_FARO_COLLECTOR_URL=${{ vars.VITE_FARO_COLLECTOR_URL }}
        sisub.args.VITE_FARO_APP_NAME=${{ vars.VITE_FARO_APP_NAME }}
        sisub.args.VITE_FARO_ENVIRONMENT=${{ vars.VITE_FARO_ENVIRONMENT }}
    secrets: inherit

  # E2E SISUB temporarily disabled.
  # Re-enable this job and add it back to deploy-sisub.needs when the CI
  # webServer timeout / test credentials setup is fixed.
  #
  # e2e-sisub:
  #   needs: [changes, check-sisub]
  #   if: needs.changes.outputs.sisub == 'true'
  #   runs-on: blacksmith-4vcpu-ubuntu-2404
  #   timeout-minutes: 20
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: oven-sh/setup-bun@v2
  #       with:
  #         bun-version: "1.3.14"
  #     - uses: actions/cache@v5
  #       with:
  #         path: ~/.bun/install/cache
  #         key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
  #         restore-keys: ${{ runner.os }}-bun-
  #     - name: Install dependencies
  #       run: bun install --frozen-lockfile
  #     - name: Install Playwright Chromium
  #       run: bunx playwright install --with-deps chromium
  #       working-directory: apps/sisub
  #     - name: Run SISUB critical E2E
  #       run: bunx turbo run test:e2e:ci --filter=./apps/sisub
  #       env:
  #         CI: true
  #         VITE_SISUB_SUPABASE_URL: ${{ vars.VITE_SISUB_SUPABASE_URL }}
  #         VITE_SISUB_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}
  #         SISUB_SUPABASE_SECRET_KEY: ${{ secrets.SISUB_SUPABASE_SECRET_KEY }}
  #         E2E_TEST_USER_EMAIL: ${{ secrets.SISUB_E2E_TEST_USER_EMAIL }}
  #         E2E_TEST_USER_PASSWORD: ${{ secrets.SISUB_E2E_TEST_USER_PASSWORD }}
  #     - name: Upload Playwright artifacts
  #       if: always()
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: sisub-playwright-artifacts
  #         path: |
  #           apps/sisub/playwright-report/
  #           apps/sisub/test-results/
  #         if-no-files-found: ignore

  secrets-sisub:
    needs: [check-sisub]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - name: Stage Fly secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          V_SISUB_SUPABASE_URL: ${{ vars.VITE_SISUB_SUPABASE_URL }}
          S_SISUB_DATABASE_URL: ${{ secrets.SISUB_DATABASE_URL }}
          V_IEFA_API_BASE_URL: ${{ vars.IEFA_API_BASE_URL }}
          V_ANALYTICS_AI_PROVIDER: ${{ vars.ANALYTICS_AI_PROVIDER }}
          V_ANALYTICS_AI_MODEL: ${{ vars.ANALYTICS_AI_MODEL }}
          V_MODULE_CHAT_AI_PROVIDER: ${{ vars.MODULE_CHAT_AI_PROVIDER }}
          V_MODULE_CHAT_AI_MODEL: ${{ vars.MODULE_CHAT_AI_MODEL }}
          S_SISUB_SUPABASE_SECRET_KEY: ${{ secrets.SISUB_SUPABASE_SECRET_KEY }}
          S_ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          S_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          S_ANALYTICS_AI_API_KEY: ${{ secrets.ANALYTICS_AI_API_KEY }}
          S_MODULE_CHAT_AI_API_KEY: ${{ secrets.MODULE_CHAT_AI_API_KEY }}
          # Observability camada 2 (OTel backend) — runtime. DESLIGADA por enquanto.
          # Para ligar: definir os secrets/var no GitHub, descomentar as 3 linhas do
          # env abaixo e as 3 linhas correspondentes no `flyctl secrets set`.
          # S_OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          # S_OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
          # V_OTEL_SERVICE_NAME: ${{ vars.OTEL_SERVICE_NAME }}
        run: |
          flyctl --config fly/sisub.toml secrets set --stage \
            "VITE_SISUB_SUPABASE_URL=$V_SISUB_SUPABASE_URL" \
            "SISUB_DATABASE_URL=$S_SISUB_DATABASE_URL" \
            "SISUB_SUPABASE_SECRET_KEY=$S_SISUB_SUPABASE_SECRET_KEY" \
            "ADMIN_SECRET=$S_ADMIN_SECRET" \
            "OPENROUTER_API_KEY=$S_OPENROUTER_API_KEY" \
            "ANALYTICS_AI_PROVIDER=$V_ANALYTICS_AI_PROVIDER" \
            "ANALYTICS_AI_MODEL=$V_ANALYTICS_AI_MODEL" \
            "ANALYTICS_AI_API_KEY=$S_ANALYTICS_AI_API_KEY" \
            "MODULE_CHAT_AI_PROVIDER=$V_MODULE_CHAT_AI_PROVIDER" \
            "MODULE_CHAT_AI_MODEL=$V_MODULE_CHAT_AI_MODEL" \
            "MODULE_CHAT_AI_API_KEY=$S_MODULE_CHAT_AI_API_KEY" \
            "IEFA_API_BASE_URL=$V_IEFA_API_BASE_URL"
            # Camada 2 (OTel) — descomentar junto com o env acima:
            # "OTEL_EXPORTER_OTLP_ENDPOINT=$S_OTEL_EXPORTER_OTLP_ENDPOINT" \
            # "OTEL_EXPORTER_OTLP_HEADERS=$S_OTEL_EXPORTER_OTLP_HEADERS" \
            # "OTEL_SERVICE_NAME=$V_OTEL_SERVICE_NAME"

  deploy-sisub:
    needs: [build-sisub, secrets-sisub]
    uses: ./.github/workflows/_app-deploy.yml
    with:
      image_repo: registry.fly.io/sisub
      image_tag: ${{ needs.build-sisub.outputs.tag }}
      fly_config: fly/sisub.toml
      health_url: ${{ vars.SISUB_HEALTH_URL }}
      concurrency_suffix: sisub
    secrets: inherit

  # ============================================================
  # FORMS  ── check → build → deploy
  # ============================================================
  check-forms:
    needs: [changes]
    if: needs.changes.outputs.forms == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/forms
        env:
          VITE_IEFA_SUPABASE_URL: ${{ vars.VITE_IEFA_SUPABASE_URL }}
          VITE_IEFA_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY }}

  build-forms:
    needs: [check-forms, warm-deps]
    uses: ./.github/workflows/_app-build.yml
    with:
      target: forms
      image_repo: registry.fly.io/iefa-forms
      bake_set: |
        forms.args.VITE_IEFA_SUPABASE_URL=${{ vars.VITE_SISUB_SUPABASE_URL }}
        forms.args.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}
        forms.args.VITE_APP_TENANT=forms
    secrets: inherit

  secrets-forms:
    needs: [check-forms]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - name: Stage Fly secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          V_IEFA_SUPABASE_URL: ${{ vars.VITE_SISUB_SUPABASE_URL }}
          S_IEFA_SUPABASE_SECRET_KEY: ${{ secrets.SISUB_SUPABASE_SECRET_KEY }}
        run: |
          flyctl secrets set --stage --config fly/forms.toml \
            "VITE_IEFA_SUPABASE_URL=$V_IEFA_SUPABASE_URL" \
            "IEFA_SUPABASE_SECRET_KEY=$S_IEFA_SUPABASE_SECRET_KEY"

  deploy-forms:
    needs: [build-forms, secrets-forms]
    uses: ./.github/workflows/_app-deploy.yml
    with:
      image_repo: registry.fly.io/iefa-forms
      image_tag: ${{ needs.build-forms.outputs.tag }}
      fly_config: fly/forms.toml
      health_url: ${{ vars.FORMS_HEALTH_URL }}
      concurrency_suffix: forms
    secrets: inherit

  # ============================================================
  # DOCS  ── check → build → deploy
  # ============================================================
  check-docs:
    needs: [changes]
    if: needs.changes.outputs.docs == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types
        run: bunx turbo run lint typecheck --filter=./apps/docs

  build-docs:
    needs: [check-docs, warm-deps]
    uses: ./.github/workflows/_app-build.yml
    with:
      target: docs
      image_repo: registry.fly.io/iefa-docs
    secrets: inherit

  deploy-docs:
    needs: [build-docs]
    uses: ./.github/workflows/_app-deploy.yml
    with:
      image_repo: registry.fly.io/iefa-docs
      image_tag: ${{ needs.build-docs.outputs.tag }}
      fly_config: fly/docs.toml
      health_url: ${{ vars.DOCS_HEALTH_URL }}
      concurrency_suffix: docs
    secrets: inherit

  # ============================================================
  # 5S (apps/forms)  ── check → build → deploy
  # ============================================================
  check-5s:
    needs: [changes]
    if: needs.changes.outputs['5s'] == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint · types · tests
        run: bunx turbo run lint typecheck test --filter=./apps/forms
        env:
          VITE_IEFA_SUPABASE_URL: ${{ vars.VITE_IEFA_SUPABASE_URL }}
          VITE_IEFA_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY }}

  build-5s:
    needs: [check-5s, warm-deps]
    uses: ./.github/workflows/_app-build.yml
    with:
      target: 5s
      image_repo: registry.fly.io/iefa-5s
      ensure_app: iefa-5s
      bake_set: |
        5s.args.VITE_IEFA_SUPABASE_URL=${{ vars.VITE_SISUB_SUPABASE_URL }}
        5s.args.VITE_IEFA_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_SISUB_SUPABASE_PUBLISHABLE_KEY }}
        5s.args.VITE_APP_TENANT=cinco-s
    secrets: inherit

  secrets-5s:
    needs: [check-5s]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - name: Stage Fly secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          V_IEFA_SUPABASE_URL: ${{ vars.VITE_SISUB_SUPABASE_URL }}
          S_IEFA_SUPABASE_SECRET_KEY: ${{ secrets.SISUB_SUPABASE_SECRET_KEY }}
        run: |
          flyctl secrets set --stage --config fly/5s.toml \
            "VITE_IEFA_SUPABASE_URL=$V_IEFA_SUPABASE_URL" \
            "IEFA_SUPABASE_SECRET_KEY=$S_IEFA_SUPABASE_SECRET_KEY"

  deploy-5s:
    needs: [build-5s, secrets-5s]
    uses: ./.github/workflows/_app-deploy.yml
    with:
      image_repo: registry.fly.io/iefa-5s
      image_tag: ${{ needs.build-5s.outputs.tag }}
      fly_config: fly/5s.toml
      health_url: ${{ vars.FORMS_5S_HEALTH_URL }}
      concurrency_suffix: 5s
    secrets: inherit

