# fly.toml app configuration file generated for iefa-rag on 2025-10-21T08:46:18-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'iefa-rag'
primary_region = 'gru'

[build]
  image = "registry.fly.io/iefa-rag:latest"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = "requests"
    soft_limit = 10
    hard_limit = 15

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[deploy]
  strategy = "rolling"

[restart_policy]
  policy = "on-failure"
  max_retries = 5